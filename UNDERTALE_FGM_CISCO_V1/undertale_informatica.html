<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undertale Bossfight: Il Duo di Informatica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            background-color: black; color: white; font-family: 'VT323', monospace;
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            user-select: none; -webkit-user-select: none; overflow: hidden; letter-spacing: 1px;
        }

        #intro-screen, #naming-screen, #confirm-screen, #save-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: black; z-index: 100;
        }
        #naming-screen, #confirm-screen, #save-screen { display: none; }

        .title-undertale { font-size: 80px; letter-spacing: 12px; margin: 0; text-align: center; }
        .title-yellow { font-size: 60px; letter-spacing: 5px; color: #00ff00; margin-top: 10px; text-align: center; }

        .naming-title { font-size: 40px; margin-bottom: 30px; text-align: center; }
        #player-name-display { font-size: 60px; letter-spacing: 10px; margin-bottom: 40px; height: 60px; color: white; text-align: center; }
        #naming-grid { display: grid; grid-template-columns: repeat(7, 50px); gap: 15px 30px; text-align: center; font-size: 40px; margin-bottom: 30px; }
        .naming-char { color: white; transition: color 0.1s; cursor: pointer; }
        .naming-char.active { color: #00ff00; text-shadow: 0 0 5px #00ff00; }

        #confirm-name-display { font-size: 60px; letter-spacing: 10px; margin-bottom: 40px; }
        #confirm-message { font-size: 30px; text-align: center; margin-bottom: 60px; white-space: pre-wrap; min-height: 80px; padding: 0 40px; line-height: 1.2; }
        .confirm-options { display: flex; justify-content: space-around; width: 400px; font-size: 40px; }
        .confirm-opt { display: flex; align-items: center; cursor: pointer; }

        .save-box { width: 500px; max-width: 90%; border: 4px solid white; padding: 25px; box-sizing: border-box; }
        .save-header { display: flex; justify-content: space-between; font-size: 32px; margin-bottom: 10px; }
        .save-location { font-size: 32px; margin-bottom: 40px; color: #00ff00; }
        .save-options { display: flex; justify-content: space-around; font-size: 32px; }
        .cursor { color: red; margin-right: 15px; font-size: 26px; }

        #game-container {
            width: 540px; display: none; flex-direction: column; align-items: center; position: relative;
        }

        /* ── BOSS AREA: immagini GRANDI e affiancate ── */
        #boss-area {
            width: 100%;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            margin-bottom: 14px;
        }

        .boss-entity {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ogni sprite occupa metà larghezza del contenitore (270px) */
        .boss-sprite {
            width: 270px;
            height: 310px;
            object-fit: cover;
            object-position: top center;
            image-rendering: pixelated;
            filter: grayscale(100%) contrast(180%) brightness(90%);
        }

        #boss-hardware { animation: floatHard 4s infinite ease-in-out; }
        #boss-software { animation: floatSoft 3s infinite ease-in-out; }

        @keyframes floatHard { 0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);} }
        @keyframes floatSoft { 0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);} }
        @keyframes dodgeAnim { 0%{transform:translateX(0);}20%{transform:translateX(-70px);}80%{transform:translateX(-70px);}100%{transform:translateX(0);} }
        .dodging { animation: dodgeAnim 0.8s ease-out !important; }

        .miss-text {
            position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
            font-size: 36px; color: #b3b3b3; display: none;
        }

        .boss-bubble {
            position: absolute; top: -50px; z-index: 99; background: white; color: black;
            padding: 8px 12px; border: 3px solid black; border-radius: 12px;
            font-size: 18px; display: none; width: 140px; line-height: 1.2; text-align: center;
        }
        #bubble-left  { left: 10px; }
        #bubble-right { right: 10px; }

        /* ── BATTLE BOX ── */
        #battle-box {
            width: 540px; height: 160px; border: 4px solid white; position: relative;
            background: black; margin: 0 auto;
            transition: width .3s cubic-bezier(.2,.8,.2,1), height .3s cubic-bezier(.2,.8,.2,1);
            overflow: hidden;
        }
        #text-area { padding: 15px 20px; font-size: 32px; line-height: 1.2; position: absolute; top:0; left:0; width:100%; height:100%; box-sizing:border-box; }
        #battle-canvas { display:none; width:100%; height:100%; }
        #target-bar { display:none; width:100%; height:100%; background:#111; position:relative; border-bottom:2px solid #00ff00; }
        #target-cursor { position:absolute; left:0; top:0; width:8px; height:100%; background:#00ff00; box-shadow:0 0 10px #00ff00; }

        #stats-area { width:540px; display:flex; justify-content:space-between; align-items:center; margin-top:15px; font-size:28px; }
        .hp-bar-bg { width:100px; height:22px; background:#c00; display:inline-block; margin:0 10px; }
        .hp-bar-fill { width:100%; height:100%; background:#ff0; transition:width .2s; }

        #buttons-area { width:540px; display:flex; justify-content:space-between; margin-top:20px; }
        .action-btn { border:2px solid #f90; color:#f90; padding:5px 15px; font-size:26px; cursor:pointer; flex:1; margin:0 5px; text-align:center; }
        .action-btn.active { background:#f90; color:black; }

        #mobile-controls { display:none; position:absolute; bottom:10px; left:0; width:100%; justify-content:space-between; padding:0 10px; z-index:200; box-sizing:border-box; }
        .dpad { position:relative; width:140px; height:140px; }
        .dpad-btn { position:absolute; width:45px; height:45px; background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.4); border-radius:8px; display:flex; justify-content:center; align-items:center; color:white; cursor:pointer; }
        .dpad-btn.up{top:0;left:47px;} .dpad-btn.down{bottom:0;left:47px;} .dpad-btn.left{top:47px;left:0;} .dpad-btn.right{top:47px;right:0;}
        .action-buttons { display:flex; align-items:flex-end; gap:10px; margin-bottom:20px; }
        .action-btn-mobile { width:55px; height:55px; border-radius:50%; background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.4); display:flex; justify-content:center; align-items:center; font-size:24px; color:white; cursor:pointer; }

        /* ── ANIMAZIONI MORTE BOSS ── */
        @keyframes soulAppear {
            0%   { transform:translate(-50%,-50%) scale(0) rotate(-20deg); opacity:0; }
            55%  { transform:translate(-50%,-50%) scale(1.45) rotate(6deg); opacity:1; }
            100% { transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
        }
        @keyframes soulShake {
            0%,100%{ transform:translate(-50%,-50%) scale(1); }
            20%   { transform:translate(calc(-50% + 8px),-50%) scale(1.06); }
            40%   { transform:translate(calc(-50% - 8px),-50%) scale(0.94); }
            60%   { transform:translate(-50%,calc(-50% + 7px)) scale(1.06); }
            80%   { transform:translate(-50%,calc(-50% - 7px)) scale(0.94); }
        }
        @keyframes soulDissolve {
            0%   { transform:translate(-50%,-50%) scale(1); opacity:1; filter:brightness(1); }
            15%  { filter:brightness(5); }
            35%  { filter:brightness(1) saturate(0); transform:translate(-50%,-50%) scale(1.05); }
            55%  { filter:brightness(10); transform:translate(-50%,-50%) scale(1.1); }
            75%  { transform:translate(-50%,-50%) scale(0.55) rotate(12deg); opacity:0.6; filter:brightness(18) saturate(0); }
            100% { transform:translate(-50%,-50%) scale(0); opacity:0; filter:brightness(30); }
        }
        @keyframes fragFly {
            0%   { transform:translate(-50%,-50%) scale(1); opacity:1; }
            60%  { opacity:0.8; }
            100% { transform:translate(calc(-50% + var(--fx)), calc(-50% + var(--fy))) scale(0.1) rotate(120deg); opacity:0; }
        }
        @keyframes bossFlash {
            0%,100%{ filter:grayscale(100%) contrast(180%) brightness(90%); }
            25%   { filter:brightness(30) saturate(0); }
            50%   { filter:grayscale(100%) contrast(180%) brightness(90%); }
            75%   { filter:brightness(25) saturate(0); }
        }
        @keyframes rageFlash {
            0%,100%{ filter:grayscale(100%) contrast(180%) brightness(90%); }
            50%   { filter:grayscale(0%) contrast(200%) brightness(150%) sepia(1) hue-rotate(-20deg); }
        }
        .boss-sprite.raging { animation: floatHard 1.5s infinite ease-in-out, rageFlash 0.6s infinite !important; }
        #boss-software.raging { animation: floatSoft 1.2s infinite ease-in-out, rageFlash 0.6s infinite 0.1s !important; }
        .soul-main {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%) scale(0);
            font-size:80px; z-index:50; color:#ff2222;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 60px #880000;
            pointer-events:none; font-family:Arial;
        }
        .soul-fragment {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%);
            font-size:24px; color:#ff2222; z-index:51;
            pointer-events:none;
            text-shadow: 0 0 8px #ff0000;
        }

        @media (max-width:600px) {
            #game-container, #stats-area, #buttons-area { width:95%; }
            #battle-box { width:95%; }
            #buttons-area { flex-wrap:wrap; }
            .action-btn { font-size:20px; flex-basis:45%; margin-bottom:5px; }
            #mobile-controls { display:flex; }
            .boss-sprite { width:160px; height:190px; }
            #boss-area { height:210px; }
            .boss-bubble { top:-50px; font-size:15px; width:120px; }
        }
    </style>
</head>
<body>

<div id="intro-screen">
    <div class="title-undertale">UNDERTALE</div>
    <div class="title-yellow">LABORATORIO INF.</div>
</div>

<div id="naming-screen">
    <div class="naming-title" id="naming-title">Login Utente:</div>
    <div id="player-name-display">_ _ _ _ _ _ _ _</div>
    <div id="naming-grid"></div>
</div>

<div id="confirm-screen">
    <div id="confirm-name-display">STUDENTE</div>
    <div id="confirm-message">Confermi le credenziali?</div>
    <div class="confirm-options">
        <div class="confirm-opt" id="opt-yes"><span class="cursor" id="cursor-yes">❤</span> Sì</div>
        <div class="confirm-opt" id="opt-no"><span class="cursor" id="cursor-no">❤</span> No</div>
    </div>
</div>

<div id="save-screen">
    <div class="save-box">
        <div class="save-header">
            <span id="save-name-ui">STUDENTE</span>
            <span>LV 20</span>
            <span>10:30</span>
        </div>
        <div class="save-location">Laboratorio Informatica (Ora di Pratica)</div>
        <div class="save-options">
            <div class="save-opt"><span class="cursor" id="cursor-continue">❤</span> Boot</div>
        </div>
    </div>
</div>

// ── FPS LOCKER — bloccato a 60fps ──
const TARGET_FPS = 60;
const FRAME_MS   = 1000 / TARGET_FPS;
let   lastFrameTime = 0;

function rafLocked(callback){
    return requestAnimationFrame(function loop(timestamp){
        if(timestamp - lastFrameTime < FRAME_MS){ requestAnimationFrame(loop); return; }
        lastFrameTime = timestamp;
        callback(timestamp);
    });
}

let hwQueue=[], swQueue=[];
function shuffleArr(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function nextHW(){ if(!hwQueue.length) hwQueue=shuffleArr([...quotesHardware]); return hwQueue.pop(); }
function nextSW(){ if(!swQueue.length) swQueue=shuffleArr([...quotesSoftware]); return swQueue.pop(); }

// CARICAMENTO IMMAGINI — fallback placeholder stile UT
// ═══════════════════════════════════════════════════════
(function(){
    function setupFallback(imgId, placeholderId, label){
        const img = document.getElementById(imgId);
        // Crea placeholder se non esiste
        let ph = document.getElementById(placeholderId);
        if(!ph){
            ph = document.createElement('div');
            ph.id = placeholderId;
            ph.style.cssText='display:none;width:270px;height:310px;background:#111;border:3px solid white;flex-direction:column;justify-content:center;align-items:center;font-size:26px;text-align:center;color:white;font-family:VT323,monospace;letter-spacing:2px;';
            ph.innerHTML = label;
            img.parentNode.insertBefore(ph, img.nextSibling);
        }
        function tryJpg(){
            let newSrc = img.src.replace('.png','.jpg');
            if(img.src !== newSrc){ img.src = newSrc; return; }
            img.style.display='none'; ph.style.display='flex';
        }
        img.onerror = tryJpg;
        // Se è già in errore (src non caricata in 3s)
        setTimeout(()=>{ if(!img.complete||img.naturalWidth===0){ tryJpg(); } }, 3000);
    }
    setupFallback('boss-hardware','ph-hardware','F.G.M');
    setupFallback('boss-software','ph-software','CISCO TASSI');
})();

function initNamingGrid(){
    const grid=document.getElementById('naming-grid'); grid.innerHTML='';
    namingChars.forEach((ch,idx)=>{
        let d=document.createElement('div'); d.className='naming-char'; d.innerText=ch; d.id='char-'+idx;

    }); updateNamingUI();
}

function updateNamingUI(){
    let s=playerName.split('').join(' ');
    if(playerName.length<8) s+=(playerName.length>0?' ':' ')+'_ '.repeat(8-playerName.length).trim();
    document.getElementById('player-name-display').innerText=s;
    for(let i=0;i<namingChars.length;i++){
        let el=document.getElementById('char-'+i);
        if(i===namingIndex) el.classList.add('active'); else el.classList.remove('active');
    }
}

window.addEventListener('keydown',(e)=>{keys[e.key]=true; processInput(e.key);});
window.addEventListener('keyup',(e)=>{keys[e.key]=false;});

function processInput(key){
    if(gameState==='NAMING'){
        if(key==='ArrowLeft'){ if(namingIndex%7!==0) namingIndex--; }
        else if(key==='ArrowRight'){ if(namingIndex%7!==6&&namingIndex<27) namingIndex++; }
        else if(key==='ArrowUp'){ if(namingIndex>=7) namingIndex-=7; }
        else if(key==='ArrowDown'){ if(namingIndex+7<=27) namingIndex+=7; }
        else if(key==='z'||key==='Z'||key==='Enter'){
            let ch=namingChars[namingIndex];
            if(ch==='<-') playerName=playerName.slice(0,-1);
            else if(ch==='OK'){ if(playerName.trim().length>0) checkNameEasterEggs(); }
            else if(playerName.length<8) playerName+=ch;
        } else if(key==='x'||key==='X'||key==='Backspace') playerName=playerName.slice(0,-1);
        updateNamingUI();
    }
    else if(gameState==='CONFIRM_NAME'){
        if(key==='ArrowLeft'||key==='ArrowRight'){ confirmSelection=(confirmSelection===0)?1:0; updateConfirmCursor(); }
        if(key==='z'||key==='Z'||key==='Enter'){ if(blockNameChoice||confirmSelection===1) backToNaming(); else confirmName(); }
    }
    else if(gameState==='SAVE_SCREEN'){ if(key==='z'||key==='Z'||key==='Enter') startGame(); }
    else if(gameState==='MAIN_MENU'){
        if(key==='ArrowLeft'){ selectedButton=(selectedButton-1+4)%4; updateButtons(); }
        else if(key==='ArrowRight'){ selectedButton=(selectedButton+1)%4; updateButtons(); }
        else if(key==='z'||key==='Z'||key==='Enter') selectAction();
    }
    else if(gameState==='MENU_SELECTION'){
        if(key==='ArrowUp'){ menuSelectionIndex=Math.max(0,menuSelectionIndex-1); updateMenuSelectionUI(); }
        else if(key==='ArrowDown'){ menuSelectionIndex=Math.min(menuOptions.length-1,menuSelectionIndex+1); updateMenuSelectionUI(); }
        else if(key==='z'||key==='Z'||key==='Enter') executeMenuAction();
        else if(key==='x'||key==='X') showMainMenu();
    }
    else if(gameState==='TARGET_SELECT'){ targetSelectInput(key); }
    else if(gameState==='TARGETING'){ if(key==='z'||key==='Z'||key==='Enter') stopTarget(); }
    else if(gameState==='BOSS_DIALOGUE'){ if(key==='z'||key==='Z'||key==='Enter') startDefendPhase(); }
}

function updateBossHP(showFGM, showCisco){
    let fb=document.getElementById('fgm-hp-bar');
    let cb=document.getElementById('cisco-hp-bar');
    let fw=document.getElementById('fgm-hp-wrap');
    let cw=document.getElementById('cisco-hp-wrap');

function showMainMenu(){
    gameState='MAIN_MENU'; textArea.style.display='block';
    let aliveNames = [];
    if(!fgmDead) aliveNames.push('F.G.M');
    if(!ciscoDead) aliveNames.push('CISCO TASSI');
    if(aliveNames.length === 2){
        textArea.innerHTML='* F.G.M e CISCO TASSI ti fissano.<br>* Attaccano in sincronia.';
    } else if(aliveNames.length === 1){
        textArea.innerHTML=`* ${aliveNames[0]} ti fissa.<br>* Rabbia totale.`;
    } else {
        textArea.innerHTML='* Silenzio.';
    }
    targetBar.style.display='none'; canvas.style.display='none';
    battleBox.style.height='160px'; battleBox.style.width=window.innerWidth<=600?'95%':'540px';
    updateButtons();
}

let selectedButton=0, menuSelectionIndex=0, menuOptions=[];

function selectAction(){
    if(selectedButton===0) startTargeting();
    else if(selectedButton===1){
        gameState='MENU_SELECTION';
        menuOptions=["* Controlla","* Spegni e Riaccendi","* CTRL+ALT+CANC","* Formatta il disco"];
        menuSelectionIndex=0; updateMenuSelectionUI();
    } else if(selectedButton===2){
        gameState='MENU_SELECTION';
        menuOptions=["* Pausa Caffè (Cura HP MAX)","* Chiavetta USB (Cura 50 HP)","* Energy drink (Cura 25 HP)"];
        menuSelectionIndex=0; updateMenuSelectionUI();
    } else if(selectedButton===3){
        textArea.innerHTML="* La connessione di rete non permette la fuga."; setTimeout(bossTurn,2000);
    }
}

function updateMenuSelectionUI(){
    let html='';
    menuOptions.forEach((opt,i)=>{
        let cur=(i===menuSelectionIndex)?"<span style='color:red;margin-right:10px;'>❤</span>":"<span style='margin-right:22px;'></span>";
        html+=`<div>${cur}${opt}</div>`;
    });
    textArea.innerHTML=html;
}

function executeMenuAction(){
    const opt=menuOptions[menuSelectionIndex];
    if(opt.includes('Controlla')) textArea.innerHTML='* F.G.M: ATK 99 DEF 499.<br>* CISCO TASSI: ATK 99 DEF 499.<br>* Resistenza: MOLTO ALTA.';
    else if(opt.includes('Spegni')){ textArea.innerHTML='* Provi a spegnere e riaccendere.<br>* Il sistema rallenta. Alleviato.'; sysRestartBuff=true; }
    else if(opt.includes('CTRL')){ textArea.innerHTML='* Task Manager non risponde.<br>* Anche lui ha paura.'; sysRestartBuff=false; }
    else if(opt.includes('Formatta')){ textArea.innerHTML='* Tenti di formattare.<br>* Errore: accesso negato.<br>* Hai comunque fatto ridere il prof.'; }
    else if(opt.includes('Pausa Caffè')){ playerHP=MAX_HP; updateHP(); textArea.innerHTML='* Ti sei goduto una pausa caffè.<br>* L\'aroma ti ricarica completamente.<br>* HP completamente ripristinati!'; }
    else if(opt.includes('Chiavetta')){ playerHP=Math.min(MAX_HP,playerHP+50); updateHP(); textArea.innerHTML='* Dati ripristinati dalla USB!'; }
    else if(opt.includes('Energy')){ playerHP=Math.min(MAX_HP,playerHP+25); updateHP(); textArea.innerHTML='* La caffeina ti regge in piedi.'; }
    setTimeout(bossTurn,2500);
}

// ═══════════════════════════════════════════════════════
// TARGETING — selezione nemico stile Undertale
// ═══════════════════════════════════════════════════════
let targetEnemy = 0; // 0 = F.G.M, 1 = CISCO TASSI

function startTargeting(){
    gameState = 'TARGET_SELECT';
    // Se un boss è morto, seleziona direttamente quello vivo
    if(fgmDead)       targetEnemy = 1;
    else if(ciscoDead) targetEnemy = 0;
    else               targetEnemy = 0;
    targetBar.style.display = 'none';
    canvas.style.display = 'none';
    textArea.style.display = 'block';
    updateTargetSelectUI();
}

function updateTargetSelectUI(){
    const enemies = [
        { name:'F.G.M',       dead:fgmDead },
        { name:'CISCO TASSI', dead:ciscoDead }
    ];
    // Se rimane solo un boss vivo, vai dritto alla mira senza mostrare la lista
    let alive = enemies.filter((_,i)=> !(i===0?fgmDead:ciscoDead));
    if(alive.length === 1){
        // Salta la selezione — inizia subito il targeting
        gameState = 'TARGETING';
        textArea.style.display = 'none';
        targetBar.style.display = 'block';
        targetX = 0; targetDirection = 1;
        targetLoop();
        return;
    }
    let html = '';
    enemies.forEach((e,i)=>{
        if(e.dead) return; // non mostrare boss morti
        let cursor = (i===targetEnemy)
            ? "<span style='color:red;margin-right:10px;'>❤</span>"
            : "<span style='margin-right:26px;'></span>";
        html += `<div style="margin-bottom:4px;">${cursor}${e.name}</div>`;
    });
    textArea.innerHTML = html;
}

function targetSelectInput(key){
    if(gameState !== 'TARGET_SELECT') return;
    if(key==='ArrowUp'||key==='ArrowLeft'){
        // Salta i morti
        let next = targetEnemy;
        do { next = (next - 1 + 2) % 2; } while((next===0?fgmDead:ciscoDead) && next!==targetEnemy);
        targetEnemy = next;
        updateTargetSelectUI();
    } else if(key==='ArrowDown'||key==='ArrowRight'){
        let next = targetEnemy;
        do { next = (next + 1) % 2; } while((next===0?fgmDead:ciscoDead) && next!==targetEnemy);
        targetEnemy = next;
        updateTargetSelectUI();
    } else if(key==='z'||key==='Z'||key==='Enter'){
        // Blocca se il boss selezionato è morto (sicurezza extra)
        if((targetEnemy===0 && fgmDead)||(targetEnemy===1 && ciscoDead)) return;
        gameState = 'TARGETING';
        textArea.style.display = 'none';
        targetBar.style.display = 'block';
        targetX = 0; targetDirection = 1;
        targetLoop();
    } else if(key==='x'||key==='X'){
        showMainMenu();
    }
}

function targetLoop(){
    if(gameState!=='TARGETING') return;
    targetX+=(6+currentTurn*0.4)*targetDirection;
    const lim=(battleBox.offsetWidth||540)-10;
    if(targetX>lim){targetX=lim;targetDirection=-1;} else if(targetX<0){targetX=0;targetDirection=1;}
    targetCursor.style.left=targetX+'px'; targetReqId=requestAnimationFrame(targetLoop);
}

function stopTarget(){
    cancelAnimationFrame(targetReqId); gameState='ATTACK_ANIM';
    document.getElementById('slash-anim').style.display='block';
    setTimeout(()=>{
        document.getElementById('slash-anim').style.display='none';
        let dL=document.getElementById('dmg-left');
        let dR=document.getElementById('dmg-right');

        // Calcola danno in base a dove si è fermato il cursore
        // Centro della barra = più danno
        let boxW = battleBox.offsetWidth || 540;
        let centerDist = Math.abs(targetX - boxW/2) / (boxW/2); // 0=centro 1=bordo
        let baseDmg = 800 + Math.floor(Math.random()*931);
        let finalDmg = Math.max(200, Math.round(baseDmg * (1 - centerDist * 0.4)));

        if(targetEnemy === 0 && fgmHP > 0){
            fgmHP = Math.max(0, fgmHP - finalDmg);
            fgmRage = Math.min(10, fgmRage + 1);
            dL.innerText = finalDmg; dL.style.color='#fff';
            dR.innerText = ''; dR.style.display='none';
            document.getElementById('boss-hardware').classList.add('dodging');
        } else if(targetEnemy === 1 && ciscoHP > 0){
            ciscoHP = Math.max(0, ciscoHP - finalDmg);
            ciscoRage = Math.min(10, ciscoRage + 1);
            dR.innerText = finalDmg; dR.style.color='#fff';
            dL.innerText = ''; dL.style.display='none';
            document.getElementById('boss-software').classList.add('dodging');
        } else {
            // Nemico già K.O.
            (targetEnemy===0?dL:dR).innerText='MISS';
            (targetEnemy===0?dL:dR).style.color='#b3b3b3';
        }

        if(targetEnemy===0) dL.style.display='block';
        else dR.style.display='block';

        updateBossHP(targetEnemy===0, targetEnemy===1);

        setTimeout(()=>{
            dL.style.display='none'; dR.style.display='none';
            document.getElementById('boss-hardware').classList.remove('dodging');
            document.getElementById('boss-software').classList.remove('dodging');

            // Controlla nuove morti
            let newDeathBoss = null;
            if(targetEnemy === 0 && fgmHP <= 0 && !fgmDead){
                fgmDead = true; newDeathBoss = 'fgm';
            } else if(targetEnemy === 1 && ciscoHP <= 0 && !ciscoDead){
                ciscoDead = true; newDeathBoss = 'cisco';
            }

            if(fgmHP <= 0 && ciscoHP <= 0){
                // Entrambi morti
                if(newDeathBoss){
                    playBossDeathAnim(newDeathBoss, ()=>{
                        gameState='WIN';
                        textArea.style.display='block'; canvas.style.display='none';
                        battleBox.style.width=window.innerWidth<=600?'95%':'540px';
                        battleBox.style.height='160px';
                        textArea.innerHTML='* F.G.M e CISCO TASSI crollano sulla cattedra.<br>* Le loro anime si spezzano.<br>* Ma domani sono di nuovo lì.';
                    });
                } else {
                    gameState='WIN';
                    textArea.style.display='block'; canvas.style.display='none';
                    battleBox.style.width=window.innerWidth<=600?'95%':'540px';
                    battleBox.style.height='160px';
                    textArea.innerHTML='* F.G.M e CISCO TASSI crollano sulla cattedra.<br>* Le loro anime si spezzano.<br>* Ma domani sono di nuovo lì.';
                }
            } else if(newDeathBoss){
                // Uno appena morto — animazione poi RAGE
                playBossDeathAnim(newDeathBoss, ()=>{
                    // Entra in RAGE totale
                    if(newDeathBoss === 'fgm'){
                        ciscoRage = 10;
                        document.getElementById('boss-software').classList.add('raging');
                    } else {
                        fgmRage = 10;
                        document.getElementById('boss-hardware').classList.add('raging');
                    }
                    soloRage = true;
                    soloRageAnnounced = false;
                    bossTurn();
                });
            } else {
                bossTurn();
            }
        },1000);
    },400);
}

// FUNZIONI DI GIOCO
// ═══════════════════════════════════════════════════════
function resizeBox(w,h){
    battleBox.style.width=(window.innerWidth<=600?Math.min(w,window.innerWidth-20):w)+'px';
    battleBox.style.height=h+'px';
}

function changeSoulMode(mode){
    if(currentSoulMode===mode) return;
    currentSoulMode=mode; soul.vy=0; soul.grounded=false;
    battleBox.style.backgroundColor=mode==='blue'?'#002266':'#440000';
    setTimeout(()=>{ battleBox.style.backgroundColor='black'; },350);
}

function startDefendPhase(){
    gameState='DEFEND';
    bubbleLeft.style.display='none'; bubbleRight.style.display='none';
    textArea.style.display='none'; canvas.style.display='block';
    currentDefendDuration = soloRage ? 520+Math.floor(Math.random()*160) : 430+Math.floor(Math.random()*180);
    resizeBox(400,260);
    currentSoulMode='red'; soul.x=200; soul.y=130;
    defendFrames=0; binaries=[]; hardBlocks=[]; lasers=[]; missiles=[]; viruses=[];
    invincibilityFrames=0;
    let midFrame=Math.floor(currentDefendDuration/2)+Math.floor(Math.random()*60)-30;
    soul._switchFrame=midFrame;
    lastFrameTime = 0;
    rafLocked(defendLoop);
}

function getSpd(){
    if(sysRestartBuff) return 0.7;
    let avgRage=(fgmRage+ciscoRage)/2;
    return 1+(currentTurn*0.03)+avgRage*0.18;
}
function getFGMRate(base){ return Math.max(8, base-fgmRage*3); }
function getCiscoRate(base){ return Math.max(8, base-ciscoRage*3); }

function spawnHardBlock(){
    let cw=canvas.width, ch=canvas.height;
    let fromLeft=Math.random()>0.5;
    let yPos=10+Math.random()*(ch-40);
    let spd=(3.5+Math.random()*2)*getSpd();
    hardBlocks.push({x:fromLeft?-180:cw+180, y:yPos, w:160+Math.random()*80, h:18, dx:fromLeft?spd:-spd});
}

function spawnBinary(){
    let cw=canvas.width;
    let xPos=10+Math.random()*(cw-20);
    let spd=(2.5+Math.random()*2)*getSpd();
    binaries.push({x:xPos, y:-20, vy:spd, rot:(Math.random()-0.5)*0.4, smokeOff:Math.random()*10});
}

function spawnLaser(){
    let cw=canvas.width, ch=canvas.height;
    let vert=Math.random()>0.5;
    lasers.push({vert, pos:vert?20+Math.random()*(cw-40):20+Math.random()*(ch-40), state:'charge', timer:0, w:28+Math.random()*30});
}

function spawnMissile(){
    let cw=canvas.width, ch=canvas.height;
    let fromLeft=Math.random()>0.5;
    let ox=fromLeft?-20:cw+20, oy=Math.random()*ch;
    let angle=Math.atan2(soul.y-oy, soul.x-ox);
    let spd=(3+Math.random()*1.5)*getSpd();
    missiles.push({x:ox, y:oy, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, angle});
}

function spawnVirus(){
    let cw=canvas.width, ch=canvas.height;
    let vx=(1.5+Math.random()*1.5)*(Math.random()>0.5?1:-1)*getSpd();
    let vy=(1.5+Math.random()*1.5)*(Math.random()>0.5?1:-1)*getSpd();
    viruses.push({x:Math.random()*cw, y:Math.random()*ch, vx, vy, text:'⚠'});
}

function spawnRageHoming(){
    let cw=canvas.width, ch=canvas.height;
    let ox, oy, r=Math.random();
    // Spawn vicino al giocatore (da tutti i lati)
    if(r<0.25){ox=-20; oy=soul.y+(Math.random()-0.5)*40;}
    else if(r<0.5){ox=cw+20; oy=soul.y+(Math.random()-0.5)*40;}
    else if(r<0.75){ox=soul.x+(Math.random()-0.5)*40; oy=-20;}
    else{ox=soul.x+(Math.random()-0.5)*40; oy=ch+20;}
    let angle=Math.atan2(soul.y-oy, soul.x-ox);
    let spd=(4.5+Math.random()*2)*getSpd();
    missiles.push({x:ox, y:oy, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, angle, homing:true});
}

// ANIMAZIONE MORTE BOSS — sprite sparisce, anima si spacca
// ═══════════════════════════════════════════════════════
function playBossDeathAnim(bossId, callback){
    gameState = 'BOSS_DEATH';
    const spriteId = bossId==='fgm' ? 'boss-hardware' : 'boss-software';
    const phId     = bossId==='fgm' ? 'ph-hardware'   : 'ph-software';
    const sprite   = document.getElementById(spriteId);
    const ph       = document.getElementById(phId);
    const entity   = sprite.closest('.boss-entity');
    const bossName = bossId==='fgm' ? 'F.G.M' : 'CISCO TASSI';

    // Mostra testo drammatico
    textArea.style.display='block'; canvas.style.display='none';
    battleBox.style.height='160px';
    battleBox.style.width=window.innerWidth<=600?'95%':'540px';
    textArea.innerHTML=`* ${bossName}...`;

    // Flash bianco sullo sprite
    const visEl = (sprite && sprite.style.display!=='none') ? sprite : ph;
    if(visEl){ visEl.style.animation='bossFlash 0.3s ease-out'; }

    setTimeout(()=>{
        // Nascondi sprite
        if(sprite) sprite.style.display='none';
        if(ph && ph.style.display!=='none') ph.style.display='none';

        textArea.innerHTML=`* ${bossName} è scomparso...<br>* La sua anima appare.`;

        // Crea anima principale
        const soulEl = document.createElement('div');
        soulEl.className = 'soul-main';
        soulEl.textContent = '❤';
        entity.style.position = 'relative';
        entity.appendChild(soulEl);

        requestAnimationFrame(()=>{
            soulEl.style.animation = 'soulAppear 0.55s ease-out forwards';
        });

        setTimeout(()=>{
            // Tremore — anima che sta per spaccarsi
            textArea.innerHTML=`* L'anima di ${bossName} trema.<br>* Si spacca in mille pezzi.`;
            soulEl.style.animation = 'soulShake 0.15s ease-in-out 4';

            setTimeout(()=>{
                // Frammenti che volano via
                const frags = [
                    {fx:'-90px', fy:'-70px'}, {fx:'90px', fy:'-70px'},
                    {fx:'-100px',fy:'10px'},   {fx:'100px', fy:'10px'},
                    {fx:'-30px', fy:'-100px'}, {fx:'30px',  fy:'100px'},
                    {fx:'-60px', fy:'70px'},   {fx:'60px',  fy:'-80px'},
                ];
                frags.forEach(pos=>{
                    const f = document.createElement('div');
                    f.className = 'soul-fragment';
                    f.textContent = '❤';
                    f.style.cssText += `--fx:${pos.fx};--fy:${pos.fy};animation:fragFly 0.65s ease-out forwards;`;
                    entity.appendChild(f);
                    setTimeout(()=>{ if(entity.contains(f)) entity.removeChild(f); }, 700);
                });

                // Dissolvi anima principale
                soulEl.style.animation = 'soulDissolve 0.65s ease-out forwards';

                setTimeout(()=>{
                    if(entity.contains(soulEl)) entity.removeChild(soulEl);
                    callback();
                }, 750);
            }, 620);
        }, 650);
    }, 320);
}

// TURNO BOSS
// ═══════════════════════════════════════════════════════
function bossTurn(){
    gameState='BOSS_DIALOGUE'; targetBar.style.display='none'; textArea.style.display='block';
    // Annuncio RAGE (solo prima volta)
    if(soloRage && !soloRageAnnounced){
        soloRageAnnounced = true;
        bubbleLeft.style.display='none'; bubbleRight.style.display='none';
        if(fgmDead){
            bubbleRight.innerText = 'TI DISTRUGGO!!!';
            bubbleRight.style.display='block';
            textArea.innerHTML='* CISCO TASSI è SOLO.<br>* FURIA ASSOLUTA SBLOCCATA.<br>* I suoi attacchi sono completamente mirati.';
        } else {
            bubbleLeft.innerText = 'NON ESISTERAI PIÙ!!!';
            bubbleLeft.style.display='block';
            textArea.innerHTML='* F.G.M è SOLO.<br>* FURIA ASSOLUTA SBLOCCATA.<br>* I bastoni e i caffè piovono ovunque.';
        }
        setTimeout(startDefendPhase, 2800);
        return;
    }

    bubbleLeft.style.display='none'; bubbleRight.style.display='none';
    // Mostra bolla solo per boss vivi
    if(!fgmDead){   bubbleLeft.innerText  = nextHW(); bubbleLeft.style.display='block';  }
    if(!ciscoDead){ bubbleRight.innerText = nextSW(); bubbleRight.style.display='block'; }
    let avgRage = (fgmRage + ciscoRage) / 2;
    let patternNames = [
        '* BASTONE WAVE in arrivo.',
        '* PIOGGIA DI SIGARETTE.',
        '* SCANSIONE LASER.',
        '* BASTONI INCROCIATI.',
        '* TORNADO DI CAFFE.',
        '* FURIA TOTALE.',
        '* CHAOS FINALE.'
    ];
    let pCount = 2 + Math.floor(avgRage/2);
    let nextPat = Math.floor((defendFrames+1) / 200) % Math.min(pCount, 7);
    let patLine = avgRage >= 2 ? '<br>* ' + patternNames[nextPat] : '';
    let msg;
    // Personalizza in base a chi è vivo
    if(!fgmDead && !ciscoDead){
        if(avgRage < 2)       msg = '* (Preparati. Entrambi.)';
        else if(avgRage < 4)  msg = '* Gli occhi dei prof brillano.' + patLine;
        else if(avgRage < 7)  msg = '* F.G.M stringe il bastone.' + patLine;
        else                  msg = '* MODALITA FURIA.' + patLine;
    } else if(!ciscoDead){
        if(avgRage < 5)  msg = '* CISCO TASSI ti fissa con odio.' + patLine;
        else             msg = '* CISCO TASSI ha perso la testa.' + patLine;
    } else {
        if(avgRage < 5)  msg = '* F.G.M stringe il bastone con entrambe le mani.' + patLine;
        else             msg = '* F.G.M. FURIA SENZA LIMITI.' + patLine;
    }
    textArea.innerHTML = msg;
}

// ═══════════════════════════════════════════════════════
// DEFEND LOOP
// ═══════════════════════════════════════════════════════
function defendLoop(timestamp){
    if(gameState!=='DEFEND') return;

    if(canvas.width!==battleBox.clientWidth||canvas.height!==battleBox.clientHeight){
        canvas.width=battleBox.clientWidth; canvas.height=battleBox.clientHeight;
    }

    ctx.fillStyle='rgba(0,0,0,0.82)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(defendFrames===soul._switchFrame){
        changeSoulMode(currentSoulMode==='red'?'blue':'red');
    }

    let cw=canvas.width, ch=canvas.height;
    let spd=keys['x']?soul.speed/2:soul.speed||3.2;

    if(currentSoulMode==='red'){
        let dx=0, dy=0;
        if(keys['ArrowLeft']||keys['a']) dx-=1;
        if(keys['ArrowRight']||keys['d']) dx+=1;
        if(keys['ArrowUp']||keys['w']) dy-=1;
        if(keys['ArrowDown']||keys['s']) dy+=1;
        if(dx&&dy){let l=Math.sqrt(dx*dx+dy*dy);dx/=l;dy/=l;}
        soul.x+=dx*spd; soul.y+=dy*spd;
    } else {
        let dx=0;
        if(keys['ArrowLeft']||keys['a']) dx-=1;
        if(keys['ArrowRight']||keys['d']) dx+=1;
        soul.x+=dx*spd; soul.vy+=soul.gravity||0.28;
        if((keys['ArrowUp']||keys['w'])&&soul.grounded){soul.vy=soul.jump||-8; soul.grounded=false;}
        if(!(keys['ArrowUp']||keys['w'])&&soul.vy<-2) soul.vy=-2;
        soul.y+=soul.vy;
    }

    if(soul.x<12) soul.x=12; if(soul.x>cw-12) soul.x=cw-12;
    if(soul.y<12){soul.y=12; if(currentSoulMode==='blue') soul.vy=0;}
    if(soul.y>=ch-12){soul.y=ch-12; if(currentSoulMode==='blue'){soul.vy=0;soul.grounded=true;}}
    else if(currentSoulMode==='blue') soul.grounded=false;

    if(invincibilityFrames>0) invincibilityFrames--;

    let sx=soul.x, sy=soul.y, sr=6;

    if(invincibilityFrames===0||Math.floor(invincibilityFrames/4)%2===0){
        ctx.fillStyle=currentSoulMode==='blue'?'#0066ff':'red';
        ctx.font='24px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('❤', sx, sy+2);
    }

    // ── ATTACK PATTERNS — cambiano ogni 200 frame, influenzati dalla rabbia ──
    let avgRage = (fgmRage + ciscoRage) / 2;
    let patternCount = 2 + Math.floor(avgRage / 2); // più pattern disponibili con più rabbia (max 7)
    let pattern = Math.floor(defendFrames / 200) % Math.min(patternCount, 7);

    // PATTERN 0 — BASTONE WAVE: bastoni a ondate da entrambi i lati
    if(pattern === 0){
        if(defendFrames % getFGMRate(50) === 0){ spawnHardBlock(); }
        if(fgmRage>=3 && defendFrames % getFGMRate(75) === 0){ spawnHardBlock(); }
        // sigarette rade come sottofondo
        if(defendFrames % getCiscoRate(70) === 0) spawnBinary();
    }

    // PATTERN 1 — PIOGGIA DI SIGARETTE: sigarette fitte dall'alto + caffè puntati
    if(pattern === 1){
        if(defendFrames % getCiscoRate(22) === 0) spawnBinary();
        if(ciscoRage>=2 && defendFrames % getCiscoRate(18) === 0) spawnBinary();
        if(defendFrames % getCiscoRate(55) === 0) spawnMissile();
        // bastone occasionale
        if(defendFrames % getFGMRate(90) === 0) spawnHardBlock();
    }

    // PATTERN 2 — SCANSIONE LASER: laser verticali e orizzontali in sequenza
    if(pattern === 2){
        if(defendFrames % Math.max(60, 110 - avgRage*5) === 0) spawnLaser();
        if(avgRage>=2 && defendFrames % Math.max(80, 130 - avgRage*5) === 0) spawnLaser();
        // caffè veloci come disturbo
        if(defendFrames % getCiscoRate(45) === 0) spawnMissile();
        if(defendFrames % getFGMRate(80) === 0) spawnHardBlock();
    }

    // PATTERN 3 — BASTONI INCROCIATI: bastoni da sopra e sotto + virus rimbalzanti (sblocca con rage>=4)
    if(pattern === 3 && avgRage >= 4){
        if(defendFrames % getFGMRate(35) === 0){
            // Due bastoni: uno alto uno basso
            let cw2=canvas.width;
            hardBlocks.push({x:-180, y:10,               w:160+Math.random()*60, h:18, dx:3.5*getSpd()});
            hardBlocks.push({x:cw2+180, y:canvas.height-28, w:160+Math.random()*60, h:18, dx:-3.5*getSpd()});
        }
        if(defendFrames % Math.max(120, 200-avgRage*8) === 0) spawnVirus();
        if(defendFrames % getCiscoRate(60) === 0) spawnBinary();
    } else if(pattern === 3){
        // fallback se rage ancora bassa
        if(defendFrames % getFGMRate(50) === 0) spawnHardBlock();
        if(defendFrames % getCiscoRate(35) === 0) spawnBinary();
    }

    // PATTERN 4 — CAFFE' TORNADO: caffè da tutti i lati puntati all'anima (sblocca rage>=5)
    if(pattern === 4 && avgRage >= 5){
        if(defendFrames % getCiscoRate(25) === 0){ spawnMissile(); spawnMissile(); }
        if(defendFrames % getCiscoRate(40) === 0) spawnMissile();
        if(defendFrames % getFGMRate(60) === 0) spawnHardBlock();
        if(defendFrames % Math.max(90,150-avgRage*6)===0) spawnLaser();
    } else if(pattern === 4){
        if(defendFrames % getCiscoRate(40) === 0) spawnMissile();
        if(defendFrames % getFGMRate(55) === 0) spawnHardBlock();
    }

    // PATTERN 5 — FURIA TOTALE: tutto insieme (sblocca rage>=7)
    if(pattern === 5 && avgRage >= 7){
        if(defendFrames % getFGMRate(30) === 0) spawnHardBlock();
        if(defendFrames % getFGMRate(50) === 0) spawnHardBlock();
        if(defendFrames % getCiscoRate(18) === 0) spawnBinary();
        if(defendFrames % getCiscoRate(30) === 0) spawnMissile();
        if(defendFrames % Math.max(55,100-avgRage*5) === 0) spawnLaser();
        if(defendFrames % Math.max(70,140-avgRage*8) === 0) spawnVirus();
        // switch anima automatico
        if(defendFrames % 130 === 0) changeSoulMode(currentSoulMode==='red'?'blue':'red');
    } else if(pattern === 5){
        if(defendFrames % getFGMRate(40) === 0) spawnHardBlock();
        if(defendFrames % getCiscoRate(25) === 0) spawnBinary();
        if(defendFrames % getCiscoRate(40) === 0) spawnMissile();
    }

    // PATTERN 6 — CHAOS FINALE: arena si restringe + tutto (sblocca rage>=9)
    if(pattern === 6 && avgRage >= 9){
        if(defendFrames % 200 === 1) resizeBox(220, 180); // arena piccola!
        if(defendFrames % getFGMRate(22) === 0) spawnHardBlock();
        if(defendFrames % getCiscoRate(14) === 0) spawnBinary();
        if(defendFrames % getCiscoRate(22) === 0) spawnMissile();
        if(defendFrames % 50 === 0) spawnLaser();
        if(defendFrames % 60 === 0) spawnVirus();
        if(defendFrames % 80 === 0) changeSoulMode(currentSoulMode==='red'?'blue':'red');
    } else if(pattern === 6){
        if(defendFrames % getFGMRate(35) === 0) spawnHardBlock();
        if(defendFrames % getCiscoRate(20) === 0) spawnBinary();
        if(defendFrames % getCiscoRate(35) === 0) spawnMissile();
    }

    // ═══════════════════════════════════════════════════════
    // SOLO RAGE — quando un boss è morto, attacchi mirati brutali
    // ═══════════════════════════════════════════════════════
    if(soloRage){
        // Arena si restringe dopo un po'
        if(defendFrames === 1) resizeBox(320, 220);

        if(fgmDead){
            // CISCO TASSI è solo: pioggia sigarette mirate + caffè homing + laser mirati
            if(defendFrames % 10 === 0) spawnBinary();
            if(defendFrames % 14 === 0){
                // Sigarette mirate al giocatore
                binaries.push({x:soul.x+(Math.random()-0.5)*60, y:-20, vy:(4+Math.random()*2)*getSpd(), rot:(Math.random()-0.5)*0.3, smokeOff:Math.random()*10, aimed:true});
            }
            if(defendFrames % 18 === 0) spawnRageHoming();
            if(defendFrames % 25 === 0) spawnRageHoming();
            if(defendFrames % 40 === 0) spawnLaser();
            if(defendFrames % 60 === 0) spawnVirus();
            if(defendFrames % 55 === 0) changeSoulMode(currentSoulMode==='red'?'blue':'red');
        } else {
            // F.G.M è solo: bastoni da tutte le altezze mirati + caffè homing + laser
            if(defendFrames % 12 === 0){
                // Bastone mirato (y del giocatore)
                let fromLeft = Math.random()>0.5;
                hardBlocks.push({x:fromLeft?-200:cw+200, y:Math.max(0,soul.y-9), w:200, h:18, dx:fromLeft?6*getSpd():-6*getSpd()});
            }
            if(defendFrames % 18 === 0){
                // Bastone secondo, leggermente sfasato
                let fromLeft = Math.random()<0.5;
                let offY = (Math.random()-0.5)*50;
                hardBlocks.push({x:fromLeft?-200:cw+200, y:Math.max(0,soul.y+offY), w:180, h:18, dx:fromLeft?5.5*getSpd():-5.5*getSpd()});
            }
            if(defendFrames % 22 === 0) spawnRageHoming();
            if(defendFrames % 35 === 0) spawnLaser();
            if(defendFrames % 28 === 0) spawnBinary();
            if(defendFrames % 75 === 0) spawnVirus();
            if(defendFrames % 65 === 0) changeSoulMode(currentSoulMode==='red'?'blue':'red');
        }
    }

    // ── BASTONI ──
    for(let i=hardBlocks.length-1;i>=0;i--){
        let b=hardBlocks[i]; b.x+=b.dx;
        ctx.save();
        let bx=b.x, by=b.y, stickLen=b.w, stickH=18;
        let grad=ctx.createLinearGradient(bx,by,bx,by+stickH);
        grad.addColorStop(0,'#c8853a'); grad.addColorStop(0.5,'#8B4513'); grad.addColorStop(1,'#5c2d00');
        ctx.fillStyle=grad; ctx.fillRect(bx,by,stickLen,stickH);
        ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
        for(let g=8;g<stickLen;g+=14){ctx.beginPath();ctx.moveTo(bx+g,by+1);ctx.lineTo(bx+g+3,by+stickH-1);ctx.stroke();}
        ctx.strokeStyle='#3a1a00'; ctx.lineWidth=1; ctx.strokeRect(bx,by,stickLen,stickH);
        ctx.fillStyle='#ffe066'; ctx.font='bold 16px VT323';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('EDUCATORE', bx+stickLen/2, by+stickH/2);
        ctx.restore();
        if(sx+sr>bx&&sx-sr<bx+stickLen&&sy+sr>by-2&&sy-sr<by+stickH+2) takeDamage();
        if(b.x<-200||b.x>cw+200) hardBlocks.splice(i,1);
    }

    // ── SIGARETTE ──
    for(let i=binaries.length-1;i>=0;i--){
        let bn=binaries[i]; bn.y+=bn.vy;
        ctx.save(); ctx.translate(bn.x,bn.y); ctx.rotate(bn.rot||0);
        ctx.fillStyle='#f0f0f0'; ctx.fillRect(-4,-16,8,28);
        ctx.fillStyle='#e07830'; ctx.fillRect(-4,12,8,6);
        ctx.fillStyle='#ff4400'; ctx.fillRect(-3,-18,6,4);
        if(Math.random()>0.5){ctx.fillStyle='#ffcc00';ctx.fillRect(-1,-20,2,2);}
        ctx.fillStyle='rgba(200,200,200,0.5)';
        let smoke=bn.smokeOff||0;
        ctx.fillRect(-2+Math.sin(defendFrames*0.1+smoke)*3,-24,3,3);
        ctx.fillRect(-1+Math.sin(defendFrames*0.1+smoke+1)*4,-30,2,2);
        ctx.restore();
        if(Math.hypot(sx-bn.x,sy-bn.y)<sr+10) takeDamage();
        if(bn.y>ch+40) binaries.splice(i,1);
    }

    // ── LASER ──
    for(let i=lasers.length-1;i>=0;i--){
        let L=lasers[i]; L.timer++;
        if(L.state==='charge'){
            ctx.fillStyle='rgba(255,0,0,0.25)';
            if(L.vert) ctx.fillRect(L.pos-L.w/2,0,L.w,ch);
            else ctx.fillRect(0,L.pos-L.w/2,cw,L.w);
            if(L.timer>55){L.state='fire';L.timer=0;}
        } else {
            ctx.fillStyle=L.timer%4<2?'white':'#ff0000';
            if(L.vert){ctx.fillRect(L.pos-L.w/2,0,L.w,ch);if(sx>L.pos-L.w/2&&sx<L.pos+L.w/2) takeDamage();}
            else{ctx.fillRect(0,L.pos-L.w/2,cw,L.w);if(sy>L.pos-L.w/2&&sy<L.pos+L.w/2) takeDamage();}
            if(L.timer>22) lasers.splice(i,1);
        }
    }

    // ── CAFFE ──
    for(let i=missiles.length-1;i>=0;i--){
        let m=missiles[i];
        // Homing: guida graduale verso il giocatore
        if(m.homing){
            let targetAngle=Math.atan2(soul.y-m.y, soul.x-m.x);
            let da=targetAngle-m.angle;
            while(da>Math.PI) da-=2*Math.PI;
            while(da<-Math.PI) da+=2*Math.PI;
            m.angle+=da*0.055;
            let spd=Math.hypot(m.vx,m.vy);
            m.vx=Math.cos(m.angle)*spd;
            m.vy=Math.sin(m.angle)*spd;
        }
        m.x+=m.vx; m.y+=m.vy;
        ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(m.angle);
        ctx.fillStyle='white'; ctx.fillRect(-10,-10,20,18);
        ctx.beginPath(); ctx.arc(0,8,10,0,Math.PI); ctx.fill();
        ctx.strokeStyle='white'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(14,0,7,Math.PI*1.6,Math.PI*0.4); ctx.stroke();
        ctx.fillStyle='#4a2000'; ctx.fillRect(-8,-8,16,6);
        ctx.strokeStyle='rgba(220,220,220,0.7)'; ctx.lineWidth=2;
        for(let s=0;s<2;s++){ctx.beginPath();ctx.moveTo(-4+s*6,-10);ctx.quadraticCurveTo(-6+s*6,-16,-4+s*6,-20);ctx.stroke();}
        ctx.restore();
        if(Math.hypot(sx-m.x,sy-m.y)<sr+12) takeDamage();
        let oob = m.homing ? (m.x<-150||m.x>cw+150||m.y<-150||m.y>ch+150) : (m.x<-80||m.x>cw+80||m.y<-80||m.y>ch+80);
        if(oob) missiles.splice(i,1);
    }

    // ── VIRUS ──
    for(let i=viruses.length-1;i>=0;i--){
        let v=viruses[i]; v.x+=v.vx; v.y+=v.vy;
        if(v.x<10||v.x>cw-10) v.vx*=-1;
        if(v.y<10||v.y>ch-10) v.vy*=-1;
        ctx.fillStyle='#ff4444'; ctx.font='22px Arial';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(v.text,v.x,v.y);
        if(Math.hypot(sx-v.x,sy-v.y)<sr+12) takeDamage();
    }

    defendFrames++;
    if(defendFrames>currentDefendDuration){ currentTurn++; sysRestartBuff=false; showMainMenu(); }
    else { animationId=rafLocked(defendLoop); }
}

// ═══════════════════════════════════════════════════════
// DANNO
// ═══════════════════════════════════════════════════════
function takeDamage(){
    if(invincibilityFrames>0) return;
    playerHP-=8; if(playerHP<0) playerHP=0; updateHP();
    invincibilityFrames=60;
    if(playerHP===0&&gameState!=='GAME_OVER'){
        gameState='GAME_OVER'; cancelAnimationFrame(animationId);
        textArea.style.display='block'; canvas.style.display='none';
        battleBox.style.width=window.innerWidth<=600?'95%':'540px'; battleBox.style.height='160px';
        textArea.innerHTML='* Sistema Operativo Crashato.<br>* Riavvio necessario...';
    }
}

// ═══════════════════════════════════════════════════════
// MOBILE
// ═══════════════════════════════════════════════════════
const mobileKeyMap={'m-up':'ArrowUp','m-down':'ArrowDown','m-left':'ArrowLeft','m-right':'ArrowRight','m-z':'z','m-x':'x'};
for(const [id,key] of Object.entries(mobileKeyMap)){
    const btn=document.getElementById(id);
    btn.addEventListener('touchstart',(e)=>{ e.preventDefault(); keys[key]=true; processInput(key); });
    btn.addEventListener('touchend',(e)=>{ e.preventDefault(); keys[key]=false; });
}
</script>
