<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights at Aisa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            font-family: 'VT323', monospace;
            background-color: black;
            color: white;
            user-select: none;
            overflow: hidden;
        }

        /* Effetto rumore / statica */
        .static-noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.15;
            pointer-events: none;
            z-index: 50;
            animation: staticAnim 0.2s infinite;
        }

        @keyframes staticAnim {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-2px, 2px); }
            20% { transform: translate(2px, -2px); }
            30% { transform: translate(-2px, -2px); }
            40% { transform: translate(2px, 2px); }
            50% { transform: translate(-1px, 1px); }
            60% { transform: translate(1px, -1px); }
            70% { transform: translate(-1px, -1px); }
            80% { transform: translate(1px, 1px); }
            90% { transform: translate(0, 2px); }
            100% { transform: translate(0, 0); }
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 49;
            pointer-events: none;
        }

        /* Ufficio (Sfondo panoramico Unificato) */
        .office-wall-texture {
            background-color: #2a2a35;
            background-image: repeating-linear-gradient(90deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 2px, transparent 2px, transparent 40px), radial-gradient(circle at center, #3a3a45 0%, #1a1a20 100%);
        }

        .door-container {
            overflow: hidden;
        }

        .door {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 0%;
            background-image: repeating-linear-gradient(0deg, #333 0px, #333 20px, #222 20px, #222 22px);
            border-bottom: 5px solid #111;
            transition: height 0.3s ease-in-out;
        }

        .door.closed { height: 100%; }

        .btn-door, .btn-light {
            width: 25px; height: 25px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid black;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        @media (min-width: 768px) {
            .btn-door, .btn-light { width: 35px; height: 35px; }
        }

        .btn-door { background-color: #aa0000; box-shadow: 0 4px 0 #4a0000; }
        .btn-door.active { background-color: #ff3333; box-shadow: 0 0 15px red; transform: translateY(4px); }
        .btn-light { background-color: #eeeeee; box-shadow: 0 4px 0 #888; }
        .btn-light.active { background-color: #ffffff; box-shadow: 0 0 15px white; transform: translateY(4px); }

        .map-container {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 45vw;
            height: 45vw;
            max-width: 350px;
            max-height: 350px;
            min-width: 220px;
            min-height: 220px;
            border: 4px solid #4b5563;
            background-color: rgba(17, 24, 39, 0.8);
            z-index: 40;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (max-height: 500px) {
            .map-container {
                bottom: 60px;
                right: 10px;
                min-width: 180px;
                min-height: 180px;
                width: 60vh;
                height: 60vh;
            }
            .cam-btn { font-size: 0.6rem !important; padding: 2px 4px !important; }
            .map-you { font-size: 0.6rem !important; bottom: 2% !important; }
        }

        .cam-btn {
            position: absolute;
            background: #333;
            border: 2px solid #555;
            color: white;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            padding: 4px 8px;
            transition: all 0.2s;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }
        .cam-btn:hover { background: #555; }
        .cam-btn.active { background: #00aa00; border-color: #00ff00; }

        .map-you {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            color: #eab308;
            font-size: 0.8rem;
            border: 1px solid #eab308;
            padding: 2px 6px;
            background: black;
        }

        #btn-cam-1 { top: 15%; left: 50%; }
        #btn-cam-2 { top: 35%; left: 50%; }
        #btn-cam-3 { top: 30%; left: 85%; }
        #btn-cam-4 { top: 45%; left: 15%; }
        #btn-cam-5 { top: 65%; left: 15%; }
        #btn-cam-6 { top: 65%; left: 35%; }
        #btn-cam-7 { top: 85%; left: 35%; }
        #btn-cam-8 { top: 65%; left: 65%; }
        #btn-cam-9 { top: 85%; left: 65%; }

        .cam-aisa {
            width: 16rem;
            height: 16rem;
            object-fit: cover;
            filter: grayscale(100%);
            position: absolute;
            transition: transform 0.5s;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .jumpscare-anim {
            animation: shake 0.05s infinite;
            filter: contrast(200%) brightness(150%) sepia(50%) hue-rotate(-50deg) saturate(300%);
        }

        @keyframes fadeToWhite {
            from { background-color: black; color: black; }
            to { background-color: white; color: black; }
        }
        .win-anim {
            animation: fadeToWhite 4s forwards;
        }

        .menu-aisa-img {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 150%; 
            max-width: 800px;
            object-fit: cover;
            object-position: right top;
            transform: translateX(25%);
            opacity: 0.7;
            z-index: 0;
            animation: menuTwitch 4s infinite;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .menu-aisa-img { width: 200%; transform: translateX(35%); }
        }

        @keyframes menuTwitch {
            0%, 90%, 100% { filter: brightness(1) contrast(1); margin-left: 0; margin-top: 0; }
            92% { filter: brightness(1.5) contrast(1.2); margin-left: -10px; margin-top: 5px; }
            94% { filter: brightness(0.5) contrast(1.5); margin-left: 10px; margin-top: -5px; }
            96% { filter: brightness(1.2) contrast(1.1); margin-left: -5px; margin-top: 0px; }
        }
    </style>
</head>
<body class="h-screen w-screen relative">

    <!-- Menu Principale -->
    <div id="main-menu" class="absolute inset-0 z-50 bg-black overflow-hidden">
        <div class="static-noise opacity-40"></div>
        <div class="scanlines opacity-60"></div>
        <img src="sfondo_Aisa.png" onerror="this.src='Aisa.png'" class="menu-aisa-img" alt="Aisa Menu">

        <div class="relative z-10 flex flex-col justify-between h-full p-8 md:p-16">
            <div>
                <h1 class="text-6xl md:text-8xl font-bold text-white leading-tight drop-shadow-lg tracking-wide">
                    Five<br>Nights<br>at<br>Aisa's
                </h1>
            </div>

            <div class="flex flex-col gap-4 mb-24 md:mb-16">
                <div class="group cursor-pointer w-max flex items-center" onclick="startGame(true)">
                    <span class="text-4xl md:text-5xl text-white opacity-0 group-hover:opacity-100 transition-opacity mr-4">>></span>
                    <span class="text-4xl md:text-5xl text-white group-hover:text-gray-300 transition-colors tracking-widest">
                        New Game
                    </span>
                </div>
                <div id="btn-continue" class="group cursor-not-allowed w-max flex items-center opacity-50">
                    <span class="text-4xl md:text-5xl text-white opacity-0 group-hover:opacity-100 transition-opacity mr-4">>></span>
                    <span id="text-continue" class="text-4xl md:text-5xl text-white tracking-widest">
                        Continue
                    </span>
                </div>
            </div>

            <div class="absolute bottom-4 left-8 text-white opacity-70 text-xl">v 1.13</div>
            <div class="absolute bottom-4 right-8 text-white opacity-70 text-xl">©2024 Aisa Edition</div>
            
            <div class="absolute bottom-12 left-8 text-gray-500 max-w-sm text-sm hidden md:block opacity-60">
                Luci: Sx (Bonnie), Dx (Chica/Freddy).<br>
                Cam 3: Controlla Foxy!
            </div>
        </div>
    </div>

    <!-- Container del Gioco -->
    <div id="game-container" class="hidden w-full h-full relative">
        
        <!-- UI Globale (Sempre fissa a schermo) -->
        <div class="absolute top-4 right-8 z-40 text-right pointer-events-none">
            <div id="time-display" class="text-5xl font-bold drop-shadow-md">12 AM</div>
            <div id="night-display" class="text-xl text-gray-300 drop-shadow-md">Notte 1</div>
        </div>

        <div class="absolute bottom-8 left-8 z-40 text-left pointer-events-none">
            <div class="text-2xl mb-1 drop-shadow-md">Energia: <span id="power-display">100</span>%</div>
            <div class="text-xl drop-shadow-md">Uso: <span id="usage-display" class="text-green-500">🟩</span></div>
        </div>

        <div class="absolute bottom-4 w-full flex justify-center z-40">
            <button id="cam-toggle-btn" onclick="toggleCameras()" class="px-16 py-3 bg-gray-800 border-t-4 border-l-4 border-r-4 border-gray-600 text-2xl hover:bg-gray-700 opacity-70 hover:opacity-100 transition-opacity rounded-t-xl">
                ▲ TELECAMERE ▲
            </button>
        </div>

        <!-- UFFICIO PANORAMICO -->
        <div id="office-view" class="absolute inset-0 overflow-hidden bg-black z-0">
            <!-- Questo div è largo 140vw e scivolerà a destra e sinistra -->
            <div id="office-panner" class="absolute top-0 left-0 h-full w-[140vw]">
                
                <!-- Muro principale unico in background (z-0) -->
                <div class="absolute inset-0 office-wall-texture z-[0]"></div>

                <!-- Pavimento a scacchi 3D (z-1) -->
                <div class="absolute bottom-0 left-0 w-full h-[35%] overflow-hidden z-[1] shadow-[inset_0_20px_50px_rgba(0,0,0,0.8)]">
                    <div class="absolute top-0 left-[-50%] w-[200%] h-[200%] bg-[#111]" style="background-image: linear-gradient(45deg, #050505 25%, transparent 25%), linear-gradient(-45deg, #050505 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #050505 75%), linear-gradient(-45deg, transparent 75%, #050505 75%); background-size: 50px 50px; transform: perspective(300px) rotateX(60deg); transform-origin: top;"></div>
                </div>

                <!-- LATO SINISTRO -->
                <!-- Buco Porta Sx (z-2) -->
                <div class="absolute left-[4%] bottom-[10%] w-[10%] h-[70%] bg-black border-4 border-gray-900 z-[2] shadow-[inset_0_0_30px_black] overflow-hidden">
                    <div id="left-light-overlay" class="absolute inset-0 bg-white opacity-0 transition-opacity duration-100 z-10"></div>
                    <img id="aisa-left" src="Aisa.png" class="absolute bottom-0 right-[-10%] w-[120%] h-[90%] object-contain hidden z-0 drop-shadow-[0_0_15px_blue]">
                </div>

                <!-- Porta Sx Scorrevole (z-3) -->
                <div class="door-container absolute left-[4%] bottom-[10%] w-[10%] h-[70%] z-[3] border-none pointer-events-none">
                    <div id="left-door" class="door"></div>
                </div>

                <!-- Buco Finestra Sx (z-2) -->
                <div class="absolute left-[18%] bottom-[30%] w-[6%] h-[35%] bg-black border-4 border-gray-800 z-[2] shadow-[inset_0_0_30px_black] overflow-hidden">
                    <div id="left-window-overlay" class="absolute inset-0 bg-white opacity-0 transition-opacity duration-100 z-10"></div>
                    <img id="aisa-window-left" src="Aisa.png" class="absolute bottom-[0%] right-[-80%] w-[250%] h-[120%] object-contain hidden z-0 drop-shadow-[0_0_15px_blue]">
                </div>

                <!-- Pulsanti Sx (z-4) -->
                <div class="absolute left-[1%] top-[45%] w-[2.5%] min-w-[45px] h-[18%] bg-gray-400 border-4 border-gray-600 rounded flex flex-col justify-evenly items-center shadow-[10px_10px_20px_black] z-[4]">
                    <div id="btn-door-left" class="btn-door" onclick="toggleDoor('left')"></div>
                    <div id="btn-light-left" class="btn-light" onclick="toggleLight('left')"></div>
                </div>


                <!-- LATO DESTRO -->
                <!-- Buco Porta Dx (z-2) -->
                <div class="absolute right-[4%] bottom-[10%] w-[10%] h-[70%] bg-black border-4 border-gray-900 z-[2] shadow-[inset_0_0_30px_black] overflow-hidden">
                    <div id="right-light-overlay" class="absolute inset-0 bg-white opacity-0 transition-opacity duration-100 z-10"></div>
                    <img id="aisa-right" src="Aisa.png" class="absolute bottom-0 left-[0%] w-[120%] h-[90%] object-contain hidden z-0 drop-shadow-[0_0_15px_yellow]">
                </div>

                <!-- Porta Dx Scorrevole (z-3) -->
                <div class="door-container absolute right-[4%] bottom-[10%] w-[10%] h-[70%] z-[3] border-none pointer-events-none">
                    <div id="right-door" class="door"></div>
                </div>

                <!-- Buco Finestra Dx (z-2) -->
                <div class="absolute right-[18%] bottom-[30%] w-[6%] h-[35%] bg-black border-4 border-gray-800 z-[2] shadow-[inset_0_0_30px_black] overflow-hidden">
                    <div id="right-window-overlay" class="absolute inset-0 bg-white opacity-0 transition-opacity duration-100 z-10"></div>
                    <img id="aisa-window-right" src="Aisa.png" class="absolute bottom-[0%] left-[-80%] w-[250%] h-[120%] object-contain hidden z-0 drop-shadow-[0_0_15px_yellow]">
                </div>

                <!-- Pulsanti Dx (z-4) -->
                <div class="absolute right-[1%] top-[45%] w-[2.5%] min-w-[45px] h-[18%] bg-gray-400 border-4 border-gray-600 rounded flex flex-col justify-evenly items-center shadow-[-10px_10px_20px_black] z-[4]">
                    <div id="btn-door-right" class="btn-door" onclick="toggleDoor('right')"></div>
                    <div id="btn-light-right" class="btn-light" onclick="toggleLight('right')"></div>
                </div>

                <!-- SCRIVANIA CENTRALE ALZATA E INGRANDITA (z-5) -->
                <div class="absolute left-[28%] bottom-0 w-[44%] h-[38%] bg-zinc-800 border-t-[12px] border-zinc-900 z-[5] shadow-[0_-15px_40px_rgba(0,0,0,0.95)] flex flex-col items-center">
                    
                    <!-- Finti cassetti -->
                    <div class="absolute left-[5%] top-[10%] w-[25%] h-[40%] bg-zinc-700 border-4 border-zinc-900 rounded flex flex-col justify-around px-2 shadow-inner">
                        <div class="w-full h-2 bg-black opacity-50 rounded"></div>
                        <div class="w-full h-2 bg-black opacity-50 rounded"></div>
                    </div>
                    
                    <div class="w-full h-full flex justify-center items-end pb-4 space-x-4 md:space-x-12 relative z-10">
                        
                        <!-- Monitor Sx -->
                        <div class="w-[20%] h-[60%] bg-black border-[8px] border-gray-700 rounded-lg shadow-2xl relative">
                            <div class="absolute bottom-[-16px] left-1/2 -translate-x-1/2 w-10 h-6 bg-gray-600"></div>
                            <div class="absolute inset-0 bg-blue-900 opacity-10"></div>
                        </div>
                        
                        <!-- Ventilatore -->
                        <div class="relative w-[16%] h-[75%] flex justify-center items-end mb-4">
                            <div class="absolute bottom-0 w-20 h-6 bg-gray-800 rounded-t-full shadow-lg"></div>
                            <div class="absolute bottom-3 w-5 h-16 bg-gray-700"></div>
                            <div class="absolute bottom-14 w-24 h-24 bg-gray-900 border-[6px] border-gray-800 rounded-full flex items-center justify-center animate-[spin_0.25s_linear_infinite] shadow-2xl">
                                <div class="w-full h-1.5 bg-gray-500 absolute"></div>
                                <div class="h-full w-1.5 bg-gray-500 absolute"></div>
                            </div>
                        </div>
                        
                        <!-- Monitor Dx -->
                        <div class="w-[20%] h-[60%] bg-black border-[8px] border-gray-700 rounded-lg shadow-2xl relative">
                            <div class="absolute bottom-[-16px] left-1/2 -translate-x-1/2 w-10 h-6 bg-gray-600"></div>
                            <div class="absolute inset-0 bg-blue-900 opacity-10"></div>
                        </div>

                    </div>
                </div>

                <!-- Poster e Decorazioni sul muro (z-1) -->
                <div class="absolute left-[35%] top-[15%] w-[12%] h-[25%] bg-gray-800 border-2 border-black z-[1] shadow-lg opacity-80 flex flex-wrap gap-1 p-2 transform rotate-2">
                    <div class="w-full h-[40%] bg-white opacity-80 mb-1"></div>
                    <div class="w-[45%] h-[30%] bg-yellow-200 opacity-80"></div>
                    <div class="w-[45%] h-[30%] bg-white opacity-80"></div>
                </div>
                
                <div class="absolute right-[35%] top-[20%] w-[10%] h-[20%] bg-blue-900 border-4 border-black z-[1] shadow-lg opacity-70 text-center font-bold text-white text-[0.6rem] md:text-sm pt-2 transform -rotate-3">
                    CELEBRATE
                </div>

                <!-- Ombra sul soffitto e sfumature ai bordi per profondità -->
                <div class="absolute top-0 left-0 w-full h-[25%] bg-gradient-to-b from-black to-transparent z-[6] pointer-events-none"></div>
                <div class="absolute top-0 left-0 w-[10%] h-full bg-gradient-to-r from-black to-transparent z-[6] pointer-events-none opacity-80"></div>
                <div class="absolute top-0 right-0 w-[10%] h-full bg-gradient-to-l from-black to-transparent z-[6] pointer-events-none opacity-80"></div>

            </div>
        </div>

        <!-- TELECAMERE -->
        <div id="camera-view" class="absolute inset-0 bg-black hidden z-30">
            <div class="static-noise"></div>
            <div class="scanlines"></div>
            
            <div class="absolute top-4 left-4 text-3xl font-bold text-white tracking-widest z-40">
                <span class="text-red-500 animate-pulse">●</span> REC
            </div>

            <div class="absolute top-16 left-4 text-4xl text-gray-300 font-bold z-40 drop-shadow-md border-b-2 border-gray-500 pb-2 bg-black bg-opacity-50 px-2" id="cam-name">
                CAM 1 - Palco Principale
            </div>

            <!-- Feed Video -->
            <div class="w-full h-full flex items-center justify-center bg-gray-900 relative overflow-hidden bg-cover bg-center" id="cam-feed-bg" style="background-image: url('cam1_bg.png');">
                
                <!-- Animators standard -->
                <img id="aisa-freddy" src="Aisa.png" class="cam-aisa hidden drop-shadow-[0_0_20px_#8b4513]" alt="Aisa-Freddy">
                <img id="aisa-bonnie" src="Aisa.png" class="cam-aisa hidden drop-shadow-[0_0_20px_blue]" alt="Aisa-Bonnie">
                <img id="aisa-chica" src="Aisa.png" class="cam-aisa hidden drop-shadow-[0_0_20px_yellow]" alt="Aisa-Chica">
                
                <!-- Foxy quando corre (CAM 6) -->
                <img id="aisa-foxy-run" src="Aisa.png" class="cam-aisa hidden drop-shadow-[0_0_20px_red] -skew-x-12 scale-125" alt="Aisa-Foxy-Run">

                <!-- COVO DEI PIRATI (CAM 3 Speciale) -->
                <div id="cove-container" class="hidden absolute inset-0 w-full h-full flex items-center justify-center bg-black bg-opacity-60">
                    <img id="cove-aisa" src="Aisa.png" class="w-64 h-64 object-cover filter grayscale drop-shadow-[0_0_20px_red] z-10 hidden" alt="Aisa-Foxy">
                    
                    <div id="curtain-left" class="absolute left-0 top-0 h-full w-1/2 bg-purple-900 border-r-8 border-yellow-600 transition-transform duration-[2000ms] ease-in-out z-20"></div>
                    <div id="curtain-right" class="absolute right-0 top-0 h-full w-1/2 bg-purple-900 border-l-8 border-yellow-600 transition-transform duration-[2000ms] ease-in-out z-20"></div>
                    
                    <div id="cove-sign" class="z-30 text-5xl text-white bg-black border-4 border-yellow-500 p-4 hidden transform -rotate-12 font-bold shadow-2xl">
                        È PARTITA!
                    </div>
                </div>
            </div>

            <!-- Mappa Telecamere -->
            <div class="map-container">
                <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxwYXRoIGQ9Ik01MCAyMEgyNTBWMzBINTBaTTUwIDkwSDI1MFYxMDBINDBaIiBzdHJva2U9IiMzMzMiIHN0cm9rZS13aWR0aD0iMiIgZmlsbD0ibm9uZSIvPjwvc3ZnPg==')] opacity-30"></div>
                
                <button onclick="switchCam(1)" id="btn-cam-1" class="cam-btn active">CAM 1</button>
                <button onclick="switchCam(2)" id="btn-cam-2" class="cam-btn">CAM 2</button>
                <button onclick="switchCam(3)" id="btn-cam-3" class="cam-btn border-red-500 text-red-200">CAM 3</button>
                <button onclick="switchCam(4)" id="btn-cam-4" class="cam-btn">CAM 4</button>
                <button onclick="switchCam(5)" id="btn-cam-5" class="cam-btn">CAM 5</button>
                <button onclick="switchCam(6)" id="btn-cam-6" class="cam-btn">CAM 6</button>
                <button onclick="switchCam(7)" id="btn-cam-7" class="cam-btn">CAM 7</button>
                <button onclick="switchCam(8)" id="btn-cam-8" class="cam-btn">CAM 8</button>
                <button onclick="switchCam(9)" id="btn-cam-9" class="cam-btn">CAM 9</button>
                
                <div class="map-you">TU</div>
            </div>
        </div>

    </div>

    <!-- Schermata Jumpscare -->
    <div id="jumpscare-screen" class="hidden absolute inset-0 z-50 bg-black flex items-center justify-center overflow-hidden">
        <img src="Aisa.png" class="w-full h-full object-cover jumpscare-anim scale-150" alt="Aisa Jumpscare">
        <div class="static-noise opacity-50"></div>
    </div>

    <!-- Schermata Game Over -->
    <div id="game-over-screen" class="hidden absolute inset-0 z-[60] bg-black flex flex-col items-center justify-center">
        <h1 class="text-7xl text-red-600 font-bold mb-4 animate-pulse">SEI MORTO</h1>
        <p id="jumpscare-text" class="text-3xl text-gray-300 mb-8 font-bold"></p>
        <button onclick="location.reload()" class="text-2xl text-white border border-white px-6 py-2 hover:bg-white hover:text-black transition-colors">Riprova</button>
    </div>

    <!-- Schermata Vittoria -->
    <div id="win-screen" class="hidden absolute inset-0 z-[60] bg-black flex flex-col items-center justify-center win-anim">
        <h1 class="text-8xl font-bold mb-4">6:00 AM</h1>
        <p class="text-3xl text-gray-700">Hai Sopravvissuto!</p>
        <button onclick="location.reload()" class="mt-12 text-2xl border border-gray-800 text-gray-800 px-6 py-2 hover:bg-gray-800 hover:text-white transition-colors">Torna al Menu</button>
    </div>

    <script>
        // --- Audio Context per Suoni Generati ---
        let actx;
        function initAudio() {
            if (!actx) {
                actx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playBeep(freq = 400, type = 'sine', duration = 0.1, vol = 0.1) {
            if (!actx) return;
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, actx.currentTime);
            gain.gain.setValueAtTime(vol, actx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + duration);
            osc.connect(gain);
            gain.connect(actx.destination);
            osc.start();
            osc.stop(actx.currentTime + duration);
        }

        function playJumpscareSound() {
            if (!actx) return;
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, actx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, actx.currentTime + 0.5);
            gain.gain.setValueAtTime(1, actx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 2.5);
            osc.connect(gain);
            gain.connect(actx.destination);
            osc.start();
            osc.stop(actx.currentTime + 3);
        }

        function playPowerOutSound() {
            if (!actx) return;
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200, actx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, actx.currentTime + 2);
            gain.gain.setValueAtTime(0.5, actx.currentTime);
            gain.gain.linearRampToValueAtTime(0, actx.currentTime + 2);
            osc.connect(gain);
            gain.connect(actx.destination);
            osc.start();
            osc.stop(actx.currentTime + 2);
        }

        function playWinChime() {
            if (!actx) return;
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, i) => {
                setTimeout(() => playBeep(freq, 'sine', 1.5, 0.2), i * 500);
            });
        }

        // --- Variabili di Stato del Gioco ---
        let gameLoop;
        let aiLoop;
        let power = 100.0;
        let timeHour = 0; 
        let timeTicks = 0;
        let ticksPerHour = 45; // Verrà calcolato dinamicamente
        let currentNight = 1;
        
        let state = {
            leftDoor: false,
            rightDoor: false,
            leftLight: false,
            rightLight: false,
            cameraOpen: false,
            currentCam: 1
        };

        // Aggiunti i timer individuali per gestire la logica della finestra (10-20 sec) e penalità porta aperta (5 sec)
        let animatronics = {
            freddy: { location: 1, name: "Aisa-Freddy", timer: 0, angryTimer: 0, windowMax: 15 },
            bonnie: { location: 1, name: "Aisa-Bonnie", timer: 0, angryTimer: 0, windowMax: 15 },
            chica:  { location: 1, name: "Aisa-Chica", timer: 0, angryTimer: 0, windowMax: 15 },
            foxy:   { location: 3, state: 0, name: "Aisa-Foxy" } 
        };

        let isGameOver = false;

        const camNames = {
            1: "CAM 1 - Palco Principale",
            2: "CAM 2 - Sala Mensa",
            3: "CAM 3 - Tenda dei Pirati",
            4: "CAM 4 - Cucina",
            5: "CAM 5 - Ripostiglio",
            6: "CAM 6 - Corridoio Ovest",
            7: "CAM 7 - Angolo Ovest",
            8: "CAM 8 - Corridoio Est",
            9: "CAM 9 - Angolo Est"
        };

        // --- Sistema Panning Ufficio ---
        let panX = 0;
        let targetPanX = 0;

        function initPan() {
            panX = window.innerWidth * 0.2; 
            targetPanX = panX;
            requestAnimationFrame(updatePanLoop);
        }

        document.addEventListener('mousemove', (e) => {
            if(!state.cameraOpen && !isGameOver) {
                let hiddenWidth = window.innerWidth * 0.4; 
                let ratio = e.clientX / window.innerWidth;
                targetPanX = ratio * hiddenWidth;
            }
        });

        document.addEventListener('touchmove', (e) => {
            if(!state.cameraOpen && !isGameOver) {
                let hiddenWidth = window.innerWidth * 0.4;
                let ratio = e.touches[0].clientX / window.innerWidth;
                targetPanX = ratio * hiddenWidth;
            }
        });

        function updatePanLoop() {
            if (!state.cameraOpen && !isGameOver) {
                panX += (targetPanX - panX) * 0.08; 
                document.getElementById('office-panner').style.transform = `translateX(-${panX}px)`;
            }
            requestAnimationFrame(updatePanLoop);
        }

        // --- Gestione Menu e Salvataggio ---
        function initMenu() {
            currentNight = parseInt(localStorage.getItem('aisa_night')) || 1;
            const btnContinue = document.getElementById('btn-continue');
            const textContinue = document.getElementById('text-continue');

            if (currentNight > 1) {
                btnContinue.classList.remove('cursor-not-allowed', 'opacity-50');
                btnContinue.classList.add('cursor-pointer');
                btnContinue.onclick = () => startGame(false);
                textContinue.innerText = `Continue (Notte ${currentNight})`;
                textContinue.classList.add('group-hover:text-gray-300', 'transition-colors');
            }
        }
        
        // Eseguiamo l'inizializzazione del menu all'avvio
        window.onload = initMenu;

        // --- Funzioni Principali ---

        function startGame(isNew = false) {
            if (isNew) {
                currentNight = 1;
                localStorage.setItem('aisa_night', 1);
            }

            // La notte 1 è più veloce (25s per ora di gioco). Aumenta di 5s ogni notte.
            ticksPerHour = Math.min(25 + (currentNight - 1) * 5, 50);
            
            document.getElementById('night-display').innerText = `Notte ${currentNight}`;

            initAudio();
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            
            initPan(); 
            gameLoop = setInterval(updateGame, 1000); // 1 tick al secondo per l'energia e i timer della finestra
            aiLoop = setInterval(updateAI, 3000);     // 1 tick ogni 3 secondi per i movimenti casuali tra le stanze
            
            updateOfficeView();
        }

        function updateGame() {
            if (isGameOver) return;

            // Timer generali (Ore del gioco)
            timeTicks++;
            if (timeTicks >= ticksPerHour) {
                timeTicks = 0;
                timeHour++;
                document.getElementById('time-display').innerText = (timeHour === 0 ? 12 : timeHour) + " AM";
                if (timeHour >= 6) {
                    winGame();
                    return;
                }
            }

            // Aggiorna logicamente i timer delle finestre ogni secondo
            handleAnimatronicTimers();

            // Calcolo energia
            let usage = 1;
            if (state.leftDoor) usage++;
            if (state.rightDoor) usage++;
            if (state.leftLight) usage++;
            if (state.rightLight) usage++;
            if (state.cameraOpen) usage++;

            let usageStr = "";
            for(let i=0; i<usage; i++) {
                if(i==0) usageStr += "🟩";
                else if(i<3) usageStr += "🟨";
                else usageStr += "🟥";
            }
            document.getElementById('usage-display').innerText = usageStr;

            power -= (usage * 0.15);
            if (power <= 0) {
                power = 0;
                powerOutage();
            }
            document.getElementById('power-display').innerText = Math.floor(power);
        }

        // Gestisce il passaggio Porta -> Finestra e il limite di 5 secondi se la porta viene aperta
        function handleAnimatronicTimers() {
            ['bonnie', 'chica', 'freddy'].forEach(key => {
                let anim = animatronics[key];
                let isLeft = (key === 'bonnie');
                let doorLoc = isLeft ? 10 : 11;
                let windowLoc = isLeft ? 12 : 13;
                let isDoorClosed = isLeft ? state.leftDoor : state.rightDoor;

                if (anim.location === doorLoc) {
                    // Sono alla porta. Se è chiusa, dopo 3 secondi si spostano alla finestra
                    if (isDoorClosed) {
                        anim.timer++;
                        if (anim.timer >= 3) {
                            anim.location = windowLoc;
                            anim.timer = 0;
                            anim.windowMax = 10 + Math.floor(Math.random() * 11); // Da 10 a 20 secondi
                            anim.angryTimer = 0;
                            updateOfficeView();
                        }
                    } else {
                        anim.timer = 0; // Se la porta è aperta, il timer di "attesa" si azzera
                    }
                } else if (anim.location === windowLoc) {
                    // Sono alla finestra, scorre il tempo di permanenza generale (10-20 sec)
                    anim.timer++;

                    if (!isDoorClosed) {
                        // Allarme: la porta è stata aperta mentre sono alla finestra!
                        anim.angryTimer++;
                        if (anim.angryTimer >= 5) {
                            triggerJumpscare(anim.name);
                        }
                    } else {
                        // Porta richiusa, si calmano (timer reset)
                        anim.angryTimer = 0;
                    }

                    // Se è passato il tempo massimo alla finestra, se ne vanno
                    if (anim.timer >= anim.windowMax) {
                        anim.location = 2; // Tornano in Sala Mensa
                        anim.timer = 0;
                        anim.angryTimer = 0;
                        updateOfficeView();
                        updateCameraFeed();
                    }
                }
            });
        }

        // --- Intelligenza Artificiale ---
        function updateAI() {
            if (isGameOver) return;

            // L'intelligenza scala in base alla Notte (Notte 1: calma, Notti successive: aggressiva)
            let aiLevel = (currentNight * 2) - 1 + timeHour; 
            
            if (Math.random() * 20 < aiLevel + 2) moveAnimatronic('bonnie');
            if (Math.random() * 20 < aiLevel) moveAnimatronic('chica');
            if (timeHour >= 2 && Math.random() * 20 < aiLevel - 1) moveAnimatronic('freddy');
            if (Math.random() * 20 < aiLevel + 1) updateFoxy();
        }

        function moveAnimatronic(name) {
            let anim = animatronics[name];
            let loc = anim.location;
            let moved = false;
            
            // Se sono fermi alla finestra (12, 13) non devono muoversi casualmente, ci pensa handleAnimatronicTimers()
            if (loc === 12 || loc === 13) return;

            if (name === 'bonnie') {
                if(loc===1) anim.location=2;
                else if(loc===2) anim.location=5; 
                else if(loc===5) anim.location=6; 
                else if(loc===6) anim.location=7; 
                else if(loc===7) anim.location=10;
                else if(loc===10) {
                    // Se la porta è aperta ti salta addosso (jumpscare diretto), se è chiusa non facciamo niente (ci pensa il timer a spostarlo alla finestra)
                    if(!state.leftDoor && Math.random()<0.4) triggerJumpscare(anim.name);
                }
                if(loc !== anim.location) moved = true;
            }
            else if (name === 'chica') {
                if(loc===1) anim.location=2;
                else if(loc===2) anim.location=4; 
                else if(loc===4) anim.location=8; 
                else if(loc===8) anim.location=9; 
                else if(loc===9) anim.location=11;
                else if(loc===11) {
                    if(!state.rightDoor && Math.random()<0.4) triggerJumpscare(anim.name);
                }
                if(loc !== anim.location) moved = true;
            }
            else if (name === 'freddy') {
                if (state.cameraOpen) return;
                if(loc===1) anim.location=2;
                else if(loc===2) anim.location=8; 
                else if(loc===8) anim.location=9; 
                else if(loc===9) anim.location=11;
                else if(loc===11) {
                    if(!state.rightDoor && Math.random()<0.6) triggerJumpscare(anim.name);
                }
                if(loc !== anim.location) moved = true;
            }

            if (moved) {
                anim.timer = 0; // Azzera il timer ogni volta che cambiano stanza
                anim.angryTimer = 0;
                updateCameraFeed();
                updateOfficeView();
                if (state.cameraOpen) triggerCamStatic();
            }
        }

        function updateFoxy() {
            let foxy = animatronics.foxy;
            
            if (foxy.location === 3) {
                if (state.cameraOpen && state.currentCam === 3) return;
                
                foxy.state++;
                if (foxy.state >= 3) {
                    foxy.location = 6;
                }
                updateCameraFeed();
                if(state.cameraOpen) triggerCamStatic();
            } 
            else if (foxy.location === 6) {
                foxy.location = 10;
                updateCameraFeed();
                if(state.cameraOpen) triggerCamStatic();
            } 
            else if (foxy.location === 10) {
                if (!state.leftDoor) {
                    triggerJumpscare(foxy.name);
                } else {
                    playBeep(100, 'sawtooth', 0.2, 0.5); 
                    setTimeout(() => playBeep(100, 'sawtooth', 0.2, 0.5), 300);
                    setTimeout(() => playBeep(100, 'sawtooth', 0.2, 0.5), 600);
                    
                    power = Math.max(0, power - 8); 
                    foxy.location = 3;
                    foxy.state = 0; 
                    updateCameraFeed();
                }
            }
        }

        function triggerCamStatic() {
            playBeep(100, 'square', 0.1, 0.05);
            const feed = document.getElementById('cam-feed-bg');
            feed.style.opacity = '0.1';
            setTimeout(() => feed.style.opacity = '1', 200);
        }

        // --- Controlli Ufficio ---

        function toggleDoor(side) {
            if (power <= 0) return;
            playBeep(200, 'square', 0.1);
            
            if (side === 'left') {
                state.leftDoor = !state.leftDoor;
                document.getElementById('left-door').className = state.leftDoor ? 'door closed' : 'door';
                document.getElementById('btn-door-left').className = state.leftDoor ? 'btn-door active' : 'btn-door';
            } else {
                state.rightDoor = !state.rightDoor;
                document.getElementById('right-door').className = state.rightDoor ? 'door closed' : 'door';
                document.getElementById('btn-door-right').className = state.rightDoor ? 'btn-door active' : 'btn-door';
            }
            updateGame(); 
            updateOfficeView(); 
        }

        function toggleLight(side) {
            if (power <= 0) return;
            playBeep(600, 'triangle', 0.05);

            if (side === 'left') {
                state.leftLight = !state.leftLight;
                if(state.leftLight) state.rightLight = false; 
            } else {
                state.rightLight = !state.rightLight;
                if(state.rightLight) state.leftLight = false;
            }

            updateOfficeView();
            updateGame();
        }

        function updateOfficeView() {
            document.getElementById('left-light-overlay').style.opacity = state.leftLight ? '0.7' : '0';
            document.getElementById('left-window-overlay').style.opacity = state.leftLight ? '0.7' : '0';
            document.getElementById('btn-light-left').className = `btn-light ${state.leftLight ? 'active' : ''}`;
            
            document.getElementById('right-light-overlay').style.opacity = state.rightLight ? '0.7' : '0';
            document.getElementById('right-window-overlay').style.opacity = state.rightLight ? '0.7' : '0';
            document.getElementById('btn-light-right').className = `btn-light ${state.rightLight ? 'active' : ''}`;

            // LATO SINISTRO (Bonnie)
            let bonnieLoc = animatronics.bonnie.location;
            if (bonnieLoc === 10 && state.leftLight && !state.leftDoor) {
                // E' alla porta, e la porta è aperta
                document.getElementById('aisa-left').classList.remove('hidden');
                document.getElementById('aisa-window-left').classList.add('hidden');
            } else if (bonnieLoc === 12 && state.leftLight) {
                // Si è spostato alla finestra
                document.getElementById('aisa-left').classList.add('hidden');
                document.getElementById('aisa-window-left').classList.remove('hidden');
            } else {
                // Non visibile
                document.getElementById('aisa-left').classList.add('hidden');
                document.getElementById('aisa-window-left').classList.add('hidden');
            }

            // LATO DESTRO (Chica / Freddy)
            let rightAnim = (animatronics.chica.location === 11 || animatronics.chica.location === 13) ? animatronics.chica :
                            ((animatronics.freddy.location === 11 || animatronics.freddy.location === 13) ? animatronics.freddy : null);

            if (rightAnim) {
                let shadowColor = rightAnim.name === "Aisa-Chica" ? 'drop-shadow-[0_0_15px_yellow]' : 'drop-shadow-[0_0_15px_#8b4513]';
                let imgPorta = document.getElementById('aisa-right');
                let imgFinestra = document.getElementById('aisa-window-right');

                if (rightAnim.location === 11 && state.rightLight && !state.rightDoor) {
                    imgPorta.classList.remove('hidden');
                    imgFinestra.classList.add('hidden');
                    imgPorta.className = `absolute bottom-0 left-[0%] w-[120%] h-[90%] object-contain z-0 ${shadowColor}`;
                } else if (rightAnim.location === 13 && state.rightLight) {
                    imgPorta.classList.add('hidden');
                    imgFinestra.classList.remove('hidden');
                    imgFinestra.className = `absolute bottom-[0%] left-[-80%] w-[250%] h-[120%] object-contain z-0 ${shadowColor}`;
                } else {
                    imgPorta.classList.add('hidden');
                    imgFinestra.classList.add('hidden');
                }
            } else {
                document.getElementById('aisa-right').classList.add('hidden');
                document.getElementById('aisa-window-right').classList.add('hidden');
            }
        }

        // --- Controlli Telecamere ---

        function toggleCameras() {
            if (power <= 0) return;
            state.cameraOpen = !state.cameraOpen;
            
            const camView = document.getElementById('camera-view');
            const btn = document.getElementById('cam-toggle-btn');

            if (state.cameraOpen) {
                playBeep(800, 'square', 0.1);
                camView.classList.remove('hidden');
                btn.innerText = "▼ CHIUDI ▼";
                updateCameraFeed();
            } else {
                playBeep(300, 'square', 0.1);
                camView.classList.add('hidden');
                btn.innerText = "▲ TELECAMERE ▲";
            }
            updateGame();
        }

        function switchCam(id) {
            if (power <= 0) return;
            playBeep(500, 'sine', 0.05);
            state.currentCam = id;
            
            for(let i=1; i<=9; i++) {
                const btn = document.getElementById(`btn-cam-${i}`);
                if(btn) btn.classList.remove('active');
            }
            const activeBtn = document.getElementById(`btn-cam-${id}`);
            if(activeBtn) activeBtn.classList.add('active');
            
            const feed = document.getElementById('cam-feed-bg');
            feed.style.opacity = '0';
            setTimeout(() => {
                updateCameraFeed();
                feed.style.opacity = '1';
            }, 100);
        }

        function updateCameraFeed() {
            document.getElementById('cam-name').innerText = camNames[state.currentCam];
            
            const feed = document.getElementById('cam-feed-bg');
            feed.style.backgroundImage = `url('cam${state.currentCam}_bg.png')`;
            
            ['freddy', 'bonnie', 'chica', 'foxy-run'].forEach(id => {
                document.getElementById('aisa-'+id).classList.add('hidden');
            });
            document.getElementById('cove-container').classList.add('hidden');

            if (state.currentCam === 3) {
                document.getElementById('cove-container').classList.remove('hidden');
                let cl = document.getElementById('curtain-left');
                let cr = document.getElementById('curtain-right');
                let coveAisa = document.getElementById('cove-aisa');
                let coveSign = document.getElementById('cove-sign');
                
                coveAisa.classList.add('hidden');
                coveSign.classList.add('hidden');

                if (animatronics.foxy.state === 0) {
                    cl.style.transform = 'translateX(0)';
                    cr.style.transform = 'translateX(0)';
                } else if (animatronics.foxy.state === 1) {
                    cl.style.transform = 'translateX(-20%)';
                    cr.style.transform = 'translateX(20%)';
                    coveAisa.classList.remove('hidden');
                } else if (animatronics.foxy.state === 2) {
                    cl.style.transform = 'translateX(-40%)';
                    cr.style.transform = 'translateX(40%)';
                    coveAisa.classList.remove('hidden');
                } else if (animatronics.foxy.state >= 3) {
                    cl.style.transform = 'translateX(-50%)';
                    cr.style.transform = 'translateX(50%)';
                    coveSign.classList.remove('hidden');
                }
            } else {
                let presenti = ['freddy', 'bonnie', 'chica'].filter(animKey => animatronics[animKey].location === state.currentCam);
                let numeroPresenti = presenti.length;
                
                presenti.forEach((animKey, i) => {
                    let el = document.getElementById('aisa-'+animKey);
                    el.classList.remove('hidden');
                    
                    let offsetX = 0;
                    let offsetY = 0;

                    if (state.currentCam === 1) {
                        if (animKey === 'bonnie') {
                            offsetX = -240; 
                            offsetY = 40;   
                        } else if (animKey === 'freddy') {
                            offsetX = 0;    
                            offsetY = -10;  
                        } else if (animKey === 'chica') {
                            offsetX = 240;  
                            offsetY = -50;  
                        }
                    } else {
                        offsetX = (i - (numeroPresenti - 1) / 2) * 200; 
                        offsetY = (i % 2 === 0 ? 20 : -20);
                    }
                    
                    el.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${1 + Math.random()*0.05})`;
                });

                if (animatronics.foxy.location === state.currentCam && state.currentCam === 6) {
                    document.getElementById('aisa-foxy-run').classList.remove('hidden');
                }
            }
        }

        // --- Eventi Finali ---

        function powerOutage() {
            state.leftDoor = false;
            state.rightDoor = false;
            state.leftLight = false;
            state.rightLight = false;
            state.cameraOpen = false;
            
            document.getElementById('left-door').classList.remove('closed');
            document.getElementById('right-door').classList.remove('closed');
            document.getElementById('camera-view').classList.add('hidden');
            document.getElementById('cam-toggle-btn').classList.add('hidden');
            document.getElementById('office-panner').style.filter = 'brightness(0.1)';
            updateOfficeView();

            playPowerOutSound();

            setTimeout(() => {
                if (!isGameOver) triggerJumpscare("Aisa-Freddy"); 
            }, Math.random() * 5000 + 4000); 
        }

        function triggerJumpscare(whoText) {
            if (isGameOver) return;
            isGameOver = true;
            clearInterval(gameLoop);
            clearInterval(aiLoop);

            document.getElementById('camera-view').classList.add('hidden');

            playJumpscareSound();
            const jumpScreen = document.getElementById('jumpscare-screen');
            jumpScreen.classList.remove('hidden');

            document.getElementById('jumpscare-text').innerText = `${whoText} ti ha trovato.`;

            setTimeout(() => {
                jumpScreen.classList.add('hidden');
                document.getElementById('game-over-screen').classList.remove('hidden');
            }, 1500);
        }

        function winGame() {
            if (isGameOver) return;
            isGameOver = true;
            clearInterval(gameLoop);
            clearInterval(aiLoop);

            // Salva il progresso per la notte successiva
            currentNight++;
            localStorage.setItem('aisa_night', currentNight);

            playWinChime();
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
        }

    </script>
</body>
</html>
