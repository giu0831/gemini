<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights at Aisa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            font-family: 'VT323', monospace;
            background-color: black;
            color: white;
            user-select: none;
            overflow: hidden;
        }

        /* Effetto rumore / statica */
        .static-noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.15;
            pointer-events: none;
            z-index: 50;
            animation: staticAnim 0.2s infinite;
        }

        @keyframes staticAnim {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-2px, 2px); }
            20% { transform: translate(2px, -2px); }
            30% { transform: translate(-2px, -2px); }
            40% { transform: translate(2px, 2px); }
            50% { transform: translate(-1px, 1px); }
            60% { transform: translate(1px, -1px); }
            70% { transform: translate(-1px, -1px); }
            80% { transform: translate(1px, 1px); }
            90% { transform: translate(0, 2px); }
            100% { transform: translate(0, 0); }
        }

        /* Scansioni (Scanlines) */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 49;
            pointer-events: none;
        }

        /* Ufficio */
        .office-bg {
            background: radial-gradient(circle at center, #2a2a35 0%, #0a0a0c 100%);
            box-shadow: inset 0 0 100px black;
        }

        .door-container {
            position: absolute;
            bottom: 10%;
            width: 15%;
            height: 65%;
            background-color: #050505;
            border: 4px solid #1a1a1a;
            overflow: hidden;
        }

        .door {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 0%;
            background-image: repeating-linear-gradient(0deg, #333 0px, #333 20px, #222 20px, #222 22px);
            border-bottom: 5px solid #111;
            transition: height 0.3s ease-in-out;
        }

        .door.closed { height: 100%; }

        .control-panel {
            position: absolute;
            top: 40%;
            width: 40px;
            height: 100px;
            background: #222;
            border: 2px solid #444;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            border-radius: 5px;
        }

        .btn-door, .btn-light {
            width: 25px; height: 25px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid black;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .btn-door { background-color: #aa0000; }
        .btn-door.active { background-color: #ff3333; box-shadow: 0 0 10px red; }
        .btn-light { background-color: #aaaaaa; }
        .btn-light.active { background-color: #ffffff; box-shadow: 0 0 10px white; }

        /* Illuminazione porte */
        .hallway-light {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0);
            pointer-events: none;
            transition: background 0.1s;
        }
        .hallway-light.on { background: rgba(255, 255, 220, 0.4); }

        /* Telecamera e Mappa (Responsive) */
        .map-container {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 45vw;
            height: 45vw;
            max-width: 350px;
            max-height: 350px;
            min-width: 220px;
            min-height: 220px;
            border: 4px solid #4b5563;
            background-color: rgba(17, 24, 39, 0.8);
            z-index: 40;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (max-height: 500px) {
            .map-container {
                bottom: 60px;
                right: 10px;
                min-width: 180px;
                min-height: 180px;
                width: 60vh;
                height: 60vh;
            }
            .cam-btn {
                font-size: 0.6rem !important;
                padding: 2px 4px !important;
            }
            .map-you {
                font-size: 0.6rem !important;
                bottom: 2% !important;
            }
        }

        .cam-btn {
            position: absolute;
            background: #333;
            border: 2px solid #555;
            color: white;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            padding: 4px 8px;
            transition: all 0.2s;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }
        .cam-btn:hover { background: #555; }
        .cam-btn.active { background: #00aa00; border-color: #00ff00; }

        .map-you {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            color: #eab308;
            font-size: 0.8rem;
            border: 1px solid #eab308;
            padding: 2px 6px;
            background: black;
        }

        #btn-cam-1 { top: 15%; left: 50%; }
        #btn-cam-2 { top: 35%; left: 50%; }
        #btn-cam-3 { top: 30%; left: 85%; } /* Tenda dei Pirati */
        #btn-cam-4 { top: 45%; left: 15%; }
        #btn-cam-5 { top: 65%; left: 15%; }
        #btn-cam-6 { top: 65%; left: 35%; }
        #btn-cam-7 { top: 85%; left: 35%; }
        #btn-cam-8 { top: 65%; left: 65%; }
        #btn-cam-9 { top: 85%; left: 65%; }

        /* Animazioni e Immagini Camere */
        .cam-aisa {
            width: 16rem;
            height: 16rem;
            object-fit: cover;
            filter: grayscale(100%);
            position: absolute;
            transition: transform 0.5s;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .jumpscare-anim {
            animation: shake 0.05s infinite;
            filter: contrast(200%) brightness(150%) sepia(50%) hue-rotate(-50deg) saturate(300%);
        }

        @keyframes fadeToWhite {
            from { background-color: black; color: black; }
            to { background-color: white; color: black; }
        }
        .win-anim {
            animation: fadeToWhite 4s forwards;
        }

        /* Stili Menu Principale FNAF */
        .menu-aisa-img {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 150%; 
            max-width: 800px;
            object-fit: cover;
            object-position: right top;
            transform: translateX(25%);
            opacity: 0.7;
            z-index: 0;
            animation: menuTwitch 4s infinite;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .menu-aisa-img {
                width: 200%;
                transform: translateX(35%);
            }
        }

        @keyframes menuTwitch {
            0%, 90%, 100% { filter: brightness(1) contrast(1); margin-left: 0; margin-top: 0; }
            92% { filter: brightness(1.5) contrast(1.2); margin-left: -10px; margin-top: 5px; }
            94% { filter: brightness(0.5) contrast(1.5); margin-left: 10px; margin-top: -5px; }
            96% { filter: brightness(1.2) contrast(1.1); margin-left: -5px; margin-top: 0px; }
        }
    </style>
</head>

    <script>
        // --- Audio Context per Suoni Generati ---
        let actx;
        function initAudio() {
            if (!actx) {
                actx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playBeep(freq = 400, type = 'sine', duration = 0.1, vol = 0.1) {
            if (!actx) return;
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, actx.currentTime);
            gain.gain.setValueAtTime(vol, actx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + duration);
            osc.connect(gain);
            gain.connect(actx.destination);
            osc.start();
            osc.stop(actx.currentTime + duration);
        }

        function playJumpscareSound() {
            if (!actx) return;
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, actx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, actx.currentTime + 0.5);
            gain.gain.setValueAtTime(1, actx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 2.5);
            osc.connect(gain);
            gain.connect(actx.destination);
            osc.start();
            osc.stop(actx.currentTime + 3);
        }

        function playPowerOutSound() {
            if (!actx) return;
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200, actx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, actx.currentTime + 2);
            gain.gain.setValueAtTime(0.5, actx.currentTime);
            gain.gain.linearRampToValueAtTime(0, actx.currentTime + 2);
            osc.connect(gain);
            gain.connect(actx.destination);
            osc.start();
            osc.stop(actx.currentTime + 2);
        }

        function playWinChime() {
            if (!actx) return;
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, i) => {
                setTimeout(() => playBeep(freq, 'sine', 1.5, 0.2), i * 500);
            });
        }

        // --- Variabili di Stato del Gioco ---
        let gameLoop;
        let aiLoop;
        let power = 100.0;
        let timeHour = 0; 
        let timeTicks = 0;
        const ticksPerHour = 45; 
        
        let state = {
            leftDoor: false,
            rightDoor: false,
            leftLight: false,
            rightLight: false,
            cameraOpen: false,
            currentCam: 1
        };

        // I 4 Animatronics
        let animatronics = {
            freddy: { location: 1, name: "Aisa-Freddy" },
            bonnie: { location: 1, name: "Aisa-Bonnie" },
            chica:  { location: 1, name: "Aisa-Chica" },
            foxy:   { location: 3, state: 0, name: "Aisa-Foxy" } 
            // Foxy states: 0(chiusa), 1(sbircia), 2(aperta), 3(partita)
        };

        let isGameOver = false;

        const camNames = {
            1: "CAM 1 - Palco Principale",
            2: "CAM 2 - Sala Mensa",
            3: "CAM 3 - Tenda dei Pirati",
            4: "CAM 4 - Cucina",
            5: "CAM 5 - Ripostiglio",
            6: "CAM 6 - Corridoio Ovest",
            7: "CAM 7 - Angolo Ovest",
            8: "CAM 8 - Corridoio Est",
            9: "CAM 9 - Angolo Est"
        };

        // --- Funzioni Principali ---

        function startGame() {
            initAudio();
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            
            gameLoop = setInterval(updateGame, 1000);
            aiLoop = setInterval(updateAI, 3000); // IA valuta di muoversi ogni 3 sec
            
            updateOfficeView();
        }

        function updateGame() {
            if (isGameOver) return;

            timeTicks++;
            if (timeTicks >= ticksPerHour) {
                timeTicks = 0;
                timeHour++;
                document.getElementById('time-display').innerText = (timeHour === 0 ? 12 : timeHour) + " AM";
                if (timeHour >= 6) {
                    winGame();
                    return;
                }
            }

            let usage = 1;
            if (state.leftDoor) usage++;
            if (state.rightDoor) usage++;
            if (state.leftLight) usage++;
            if (state.rightLight) usage++;
            if (state.cameraOpen) usage++;

            let usageStr = "";
            for(let i=0; i<usage; i++) {
                if(i==0) usageStr += "🟩";
                else if(i<3) usageStr += "🟨";
                else usageStr += "🟥";
            }
            document.getElementById('usage-display').innerText = usageStr;

            power -= (usage * 0.15);
            if (power <= 0) {
                power = 0;
                powerOutage();
            }
            document.getElementById('power-display').innerText = Math.floor(power);
        }

        // --- Intelligenza Artificiale ---
        function updateAI() {
            if (isGameOver) return;

            let aiLevel = 3 + timeHour; 
            
            // Bonnie (molto attivo)
            if (Math.random() * 20 < aiLevel + 2) moveAnimatronic('bonnie');
            // Chica (media)
            if (Math.random() * 20 < aiLevel) moveAnimatronic('chica');
            // Freddy (attivo tardi e se telecamere chiuse)
            if (timeHour >= 2 && Math.random() * 20 < aiLevel - 1) moveAnimatronic('freddy');
            // Foxy (gestione tende)
            if (Math.random() * 20 < aiLevel + 1) updateFoxy();
        }

        function moveAnimatronic(name) {
            let anim = animatronics[name];
            let loc = anim.location;
            let moved = false;
            
            if (name === 'bonnie') {
                if(loc===1) anim.location=2;
                else if(loc===2) anim.location=5; 
                else if(loc===5) anim.location=6; 
                else if(loc===6) anim.location=7; 
                else if(loc===7) anim.location=10; // Porta Sx
                else if(loc===10) {
                    if(!state.leftDoor && Math.random()<0.4) triggerJumpscare(anim.name);
                    else if(state.leftDoor) anim.location=2; // Torna indietro
                }
                if(loc !== anim.location) moved = true;
            }
            else if (name === 'chica') {
                if(loc===1) anim.location=2;
                else if(loc===2) anim.location=4; 
                else if(loc===4) anim.location=8; 
                else if(loc===8) anim.location=9; 
                else if(loc===9) anim.location=11; // Porta Dx
                else if(loc===11) {
                    if(!state.rightDoor && Math.random()<0.4) triggerJumpscare(anim.name);
                    else if(state.rightDoor) anim.location=2;
                }
                if(loc !== anim.location) moved = true;
            }
            else if (name === 'freddy') {
                if (state.cameraOpen) return; // Freddy non si muove se guardi le cam
                if(loc===1) anim.location=2;
                else if(loc===2) anim.location=8; 
                else if(loc===8) anim.location=9; 
                else if(loc===9) anim.location=11;
                else if(loc===11) {
                    if(!state.rightDoor && Math.random()<0.6) triggerJumpscare(anim.name);
                    else if(state.rightDoor) anim.location=1;
                }
                if(loc !== anim.location) moved = true;
            }

            if (moved) {
                updateCameraFeed();
                updateOfficeView();
                // Effetto statica telecamera se aperta
                if (state.cameraOpen) triggerCamStatic();
            }
        }

        function updateFoxy() {
            let foxy = animatronics.foxy;
            
            if (foxy.location === 3) {
                // Se stai guardando attivamente la CAM 3, Foxy non avanza
                if (state.cameraOpen && state.currentCam === 3) return;
                
                foxy.state++;
                if (foxy.state >= 3) {
                    foxy.location = 6; // Parte e va in Corridoio Ovest
                }
                updateCameraFeed();
                if(state.cameraOpen) triggerCamStatic();
            } 
            else if (foxy.location === 6) {
                // Dal corridoio corre verso la porta
                foxy.location = 10;
                updateCameraFeed();
                if(state.cameraOpen) triggerCamStatic();
            } 
            else if (foxy.location === 10) {
                // Foxy è alla porta
                if (!state.leftDoor) {
                    // Morte istantanea
                    triggerJumpscare(foxy.name);
                } else {
                    // Batte alla porta, toglie energia e si resetta
                    playBeep(100, 'sawtooth', 0.2, 0.5); 
                    setTimeout(() => playBeep(100, 'sawtooth', 0.2, 0.5), 300);
                    setTimeout(() => playBeep(100, 'sawtooth', 0.2, 0.5), 600);
                    
                    power = Math.max(0, power - 8); // Drena energia per la botta
                    foxy.location = 3;
                    foxy.state = 0; // Torna alla tenda chiusa
                    updateCameraFeed();
                }
            }
        }

        function triggerCamStatic() {
            playBeep(100, 'square', 0.1, 0.05);
            const feed = document.getElementById('cam-feed-bg');
            feed.style.opacity = '0.1';
            setTimeout(() => feed.style.opacity = '1', 200);
        }

        // --- Controlli Ufficio ---

        function toggleDoor(side) {
            if (power <= 0) return;
            playBeep(200, 'square', 0.1);
            
            if (side === 'left') {
                state.leftDoor = !state.leftDoor;
                document.getElementById('left-door').className = state.leftDoor ? 'door closed' : 'door';
                document.getElementById('btn-door-left').className = state.leftDoor ? 'btn-door active' : 'btn-door';
            } else {
                state.rightDoor = !state.rightDoor;
                document.getElementById('right-door').className = state.rightDoor ? 'door closed' : 'door';
                document.getElementById('btn-door-right').className = state.rightDoor ? 'btn-door active' : 'btn-door';
            }
            updateGame(); 
        }

        function toggleLight(side) {
            if (power <= 0) return;
            playBeep(600, 'triangle', 0.05);

            if (side === 'left') {
                state.leftLight = !state.leftLight;
                if(state.leftLight) state.rightLight = false; 
            } else {
                state.rightLight = !state.rightLight;
                if(state.rightLight) state.leftLight = false;
            }

            updateOfficeView();
            updateGame();
        }

        function updateOfficeView() {
            document.getElementById('left-light-overlay').className = `hallway-light ${state.leftLight ? 'on' : ''}`;
            document.getElementById('btn-light-left').className = `btn-light ${state.leftLight ? 'active' : ''}`;
            
            document.getElementById('right-light-overlay').className = `hallway-light ${state.rightLight ? 'on' : ''}`;
            document.getElementById('btn-light-right').className = `btn-light ${state.rightLight ? 'active' : ''}`;

            // Aisa-Bonnie alla porta sinistra
            if (animatronics.bonnie.location === 10 && state.leftLight && !state.leftDoor) {
                document.getElementById('aisa-left').classList.remove('hidden');
            } else {
                document.getElementById('aisa-left').classList.add('hidden');
            }

            // Aisa-Chica o Freddy alla porta destra
            if ((animatronics.chica.location === 11 || animatronics.freddy.location === 11) && state.rightLight && !state.rightDoor) {
                let img = document.getElementById('aisa-right');
                img.classList.remove('hidden');
                // Cambia il colore dell'ombra in base a chi è
                if(animatronics.chica.location === 11) img.className = "absolute top-1/4 left-0 w-full object-cover drop-shadow-[0_0_15px_yellow]";
                else img.className = "absolute top-1/4 left-0 w-full object-cover drop-shadow-[0_0_15px_#8b4513]";
            } else {
                document.getElementById('aisa-right').classList.add('hidden');
            }
        }

        // --- Controlli Telecamere ---

        function toggleCameras() {
            if (power <= 0) return;
            state.cameraOpen = !state.cameraOpen;
            
            const camView = document.getElementById('camera-view');
            const btn = document.getElementById('cam-toggle-btn');

            if (state.cameraOpen) {
                playBeep(800, 'square', 0.1);
                camView.classList.remove('hidden');
                btn.innerText = "▼ CHIUDI ▼";
                updateCameraFeed();
            } else {
                playBeep(300, 'square', 0.1);
                camView.classList.add('hidden');
                btn.innerText = "▲ TELECAMERE ▲";
            }
            updateGame();
        }

        function switchCam(id) {
            if (power <= 0) return;
            playBeep(500, 'sine', 0.05);
            state.currentCam = id;
            
            for(let i=1; i<=9; i++) {
                const btn = document.getElementById(`btn-cam-${i}`);
                if(btn) btn.classList.remove('active');
            }
            const activeBtn = document.getElementById(`btn-cam-${id}`);
            if(activeBtn) activeBtn.classList.add('active');
            
            const feed = document.getElementById('cam-feed-bg');
            feed.style.opacity = '0';
            setTimeout(() => {
                updateCameraFeed();
                feed.style.opacity = '1';
            }, 100);
        }

        function updateCameraFeed() {
            document.getElementById('cam-name').innerText = camNames[state.currentCam];
            
            // Imposta dinamicamente lo sfondo in base al numero della telecamera!
            const feed = document.getElementById('cam-feed-bg');
            feed.style.backgroundImage = `url('cam${state.currentCam}_bg.png')`;
            
            // Nascondi tutti prima di aggiornare
            ['freddy', 'bonnie', 'chica', 'foxy-run'].forEach(id => {
                document.getElementById('aisa-'+id).classList.add('hidden');
            });
            document.getElementById('cove-container').classList.add('hidden');

            // Logica Speciale Foxy CAM 3
            if (state.currentCam === 3) {
                document.getElementById('cove-container').classList.remove('hidden');
                let cl = document.getElementById('curtain-left');
                let cr = document.getElementById('curtain-right');
                let coveAisa = document.getElementById('cove-aisa');
                let coveSign = document.getElementById('cove-sign');
                
                coveAisa.classList.add('hidden');
                coveSign.classList.add('hidden');

                if (animatronics.foxy.state === 0) {
                    cl.style.transform = 'translateX(0)';
                    cr.style.transform = 'translateX(0)';
                } else if (animatronics.foxy.state === 1) {
                    cl.style.transform = 'translateX(-20%)';
                    cr.style.transform = 'translateX(20%)';
                    coveAisa.classList.remove('hidden');
                } else if (animatronics.foxy.state === 2) {
                    cl.style.transform = 'translateX(-40%)';
                    cr.style.transform = 'translateX(40%)';
                    coveAisa.classList.remove('hidden');
                } else if (animatronics.foxy.state >= 3) {
                    cl.style.transform = 'translateX(-50%)';
                    cr.style.transform = 'translateX(50%)';
                    coveSign.classList.remove('hidden');
                }
            } else {
                // Logica telecamere normali
                // Filtriamo quali animatronics sono presenti in questa CAM (escluso foxy che ha logiche a parte)
                let presenti = ['freddy', 'bonnie', 'chica'].filter(animKey => animatronics[animKey].location === state.currentCam);
                let numeroPresenti = presenti.length;
                
                presenti.forEach((animKey, i) => {
                    let el = document.getElementById('aisa-'+animKey);
                    el.classList.remove('hidden');
                    
                    // Calcolo per distribuirli uniformemente sullo schermo in orizzontale
                    // Moltiplichiamo per 160px di distanza in modo che non si coprano
                    let offsetX = (i - (numeroPresenti - 1) / 2) * 160; 
                    
                    // Li sfalsiamo leggermente in altezza (su e giù) per dare profondità alla scena
                    let offsetY = (i % 2 === 0 ? 15 : -15);
                    
                    el.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${1 + Math.random()*0.1})`;
                });

                // Se Foxy sta correndo nella CAM 6
                if (animatronics.foxy.location === state.currentCam && state.currentCam === 6) {
                    document.getElementById('aisa-foxy-run').classList.remove('hidden');
                }
            }
        }

        // --- Eventi Finali ---

        function powerOutage() {
            state.leftDoor = false;
            state.rightDoor = false;
            state.leftLight = false;
            state.rightLight = false;
            state.cameraOpen = false;
            
            document.getElementById('left-door').classList.remove('closed');
            document.getElementById('right-door').classList.remove('closed');
            document.getElementById('camera-view').classList.add('hidden');
            document.getElementById('cam-toggle-btn').classList.add('hidden');
            document.getElementById('office-view').style.background = 'black';
            updateOfficeView();

            playPowerOutSound();

            setTimeout(() => {
                if (!isGameOver) triggerJumpscare("Aisa-Freddy"); // Freddy ti prende al buio
            }, Math.random() * 5000 + 4000); 
        }

        function triggerJumpscare(whoText) {
            if (isGameOver) return;
            isGameOver = true;
            clearInterval(gameLoop);
            clearInterval(aiLoop);

            document.getElementById('camera-view').classList.add('hidden');

            playJumpscareSound();
            const jumpScreen = document.getElementById('jumpscare-screen');
            jumpScreen.classList.remove('hidden');

            document.getElementById('jumpscare-text').innerText = `${whoText} ti ha trovato.`;

            setTimeout(() => {
                jumpScreen.classList.add('hidden');
                document.getElementById('game-over-screen').classList.remove('hidden');
            }, 1500);
        }

        function winGame() {
            if (isGameOver) return;
            isGameOver = true;
            clearInterval(gameLoop);
            clearInterval(aiLoop);

            playWinChime();
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
        }

    </script>
</body>
