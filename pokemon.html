<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Battle Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Press+Start+2P', cursive;
            background-color: #000;
        }

        .game-container {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            background-color: #2c3e50;
            position: relative;
        }

        /* Schermata di Selezione */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center;
            z-index: 200; color: white; text-align: center;
            padding: 40px 20px; overflow-y: auto;
        }

        .starter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; width: 100%; max-width: 900px;
            margin-bottom: 30px;
        }

        .starter-card {
            background: rgba(255, 255, 255, 0.1);
            border: 4px solid transparent; border-radius: 12px;
            padding: 10px; cursor: pointer; transition: all 0.2s;
            position: relative;
        }

        .starter-card:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
        .starter-card.selected { border-color: #FFD700; background: rgba(255, 215, 0, 0.3); }

        .selection-badge {
            position: absolute; top: -10px; right: -10px;
            background: #FFD700; color: #000;
            width: 25px; height: 25px; border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            font-size: 12px; font-weight: bold; border: 2px solid #000;
        }
        .starter-card.selected .selection-badge { display: flex; }

        /* Arena di Battaglia */
        .battle-scene {
            flex: 1;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 60%, #90EE90 60%, #90EE90 100%);
            position: relative; overflow: hidden;
            image-rendering: pixelated; display: none;
        }

        /* Avatar Avversario */
        .opponent-avatar-container {
            position: absolute; top: 20px; right: 20px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 50;
        }
        .opponent-avatar {
            width: 150px; height: 150px;
            border-radius: 50%; border: 6px solid #fff;
            background-color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Barre di Stato */
        .status-card {
            background-color: #f8f8f8; border: 4px solid #333;
            padding: 10px; width: 260px; position: absolute;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2); z-index: 10;
        }
        .enemy-status { top: 40px; left: 40px; border-bottom-right-radius: 20px; }
        .player-status { bottom: 40px; right: 40px; border-top-left-radius: 20px; }

        .health-bar-container { background-color: #555; border: 2px solid #333; height: 12px; width: 100%; margin-top: 5px; }
        .health-bar-fill { height: 100%; background-color: #4CAF50; width: 100%; transition: width 0.5s ease-in-out; }

        /* Posizionamento Pokémon e Ombre */
        .pokemon-stage {
            position: absolute;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            width: 350px; height: 350px;
        }
        .enemy-stage { top: 15%; right: 10%; }
        .player-stage { bottom: 5%; left: 10%; }

        .platform {
            background: rgba(0,0,0,0.2); border-radius: 50%;
            width: 280px; height: 60px;
            position: absolute; bottom: 10px; z-index: 1;
        }

        .pokemon-img {
            width: 280px; height: 280px;
            object-fit: contain; z-index: 5;
            position: relative; 
            bottom: -15px;
        }
        .player-stage .pokemon-img { 
            width: 340px; height: 340px; 
            bottom: -20px;
        }

        /* UI Tray */
        .ui-tray { height: 140px; background-color: #fff; border-top: 6px solid #333; display: none; grid-template-columns: 1.2fr 1fr; z-index: 100; }
        .dialog-box { padding: 20px; font-size: 14px; line-height: 1.5; display: flex; align-items: center; border-right: 4px solid #333; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 4px; background-color: #333; }
        .btn-move { background-color: #fff; border: none; cursor: pointer; font-family: 'Press+Start+2P', cursive; font-size: 10px; text-transform: uppercase; }
        .btn-move:hover:not(:disabled) { background-color: #e0e0e0; }

        /* Animazioni */
        .bounce { animation: bounce 2s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        #victory-screen, #defeat-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 300;
        }

        @media (max-width: 768px) {
            .opponent-avatar { width: 80px; height: 80px; }
            .ui-tray { grid-template-columns: 1fr; height: 180px; }
            .player-status { bottom: 190px; right: 10px; }
            .enemy-status { left: 10px; top: 10px; }
            .player-stage { left: -20px; }
            .enemy-stage { right: -20px; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        
        <!-- Selezione Squadra -->
        <div id="start-screen">
            <h1 class="text-2xl mb-4 text-yellow-400" style="text-shadow: 3px 3px 0 #000">POKÉMON BATTLE</h1>
            <p class="mb-2 text-[10px]">Componi la tua squadra (da 1 a 6):</p>
            <p class="mb-6 text-[8px] text-yellow-200 uppercase">I Leggendari hanno più HP e infliggono +50% danni!</p>
            
            <div id="starter-grid" class="starter-grid"></div>

            <div class="sticky bottom-0 bg-black/60 p-4 rounded-xl backdrop-blur-md border-t-2 border-white/20">
                <button id="start-btn" disabled onclick="startGame()" class="bg-gray-500 text-white px-10 py-4 border-b-4 border-gray-700 font-bold opacity-50 cursor-not-allowed transition-all">
                    INIZIA CON <span id="selection-count">0</span> POKÉMON
                </button>
            </div>
        </div>

        <!-- Schermate Finali -->
        <div id="victory-screen">
            <h1 class="text-yellow-500 text-4xl mb-4 text-center">CAMPIONE!</h1>
            <p class="text-[12px] mb-8 text-center px-4">Hai sconfitto l'intera squadra di EMANUELA AISA!</p>
            <button onclick="location.reload()" class="bg-blue-600 text-white p-4 font-bold border-b-4 border-blue-900 px-8">NUOVA SFIDA</button>
        </div>

        <div id="defeat-screen">
            <h1 class="text-red-500 text-4xl mb-4">SCONFITTO!</h1>
            <p class="text-[12px] mb-8">Non hai più Pokémon in grado di lottare...</p>
            <button onclick="location.reload()" class="bg-red-600 text-white p-4 font-bold border-b-4 border-red-900 px-8">RIPROVA</button>
        </div>

        <!-- Arena -->
        <div class="battle-scene" id="arena">
            <!-- Avversario -->
            <div class="opponent-avatar-container">
                <img src="https://lh3.googleusercontent.com/a-/ALV-UjX5WaAKPyFOdPE72EV2dbV2IvSo1Xbdv12mYFqvBUM9gWaaMoRU=s150-c" class="opponent-avatar" alt="Emanuela Aisa">
                <div class="text-[10px] mt-2 text-white drop-shadow-lg font-bold">EMANUELA AISA</div>
            </div>

            <div class="status-card enemy-status" id="enemy-card">
                <div class="flex justify-between text-[10px] mb-1">
                    <span id="enemy-name" class="font-bold">---</span>
                    <span>Lv50</span>
                </div>
                <div class="health-bar-container">
                    <div id="enemy-hp-bar" class="health-bar-fill"></div>
                </div>
            </div>

            <div id="enemy-stage" class="pokemon-stage enemy-stage">
                <img id="enemy-sprite" src="" class="pokemon-img bounce">
                <div class="platform"></div>
            </div>

            <!-- Giocatore -->
            <div id="player-card" class="status-card player-status">
                <div class="flex justify-between text-[10px] mb-1">
                    <span id="player-name-ui" class="font-bold">---</span>
                    <span>Lv50</span>
                </div>
                <div class="health-bar-container">
                    <div id="player-hp-bar" class="health-bar-fill"></div>
                </div>
                <div class="text-[9px] text-right mt-1" id="player-hp-text">--- / --- HP</div>
            </div>

            <div id="player-stage" class="pokemon-stage player-stage">
                <img id="player-sprite" src="" class="pokemon-img bounce" style="animation-delay: 0.5s">
                <div class="platform"></div>
            </div>
        </div>

        <!-- Controlli -->
        <div class="ui-tray" id="ui-tray">
            <div id="message-box" class="dialog-box">
                Cosa farà il tuo Pokémon?
            </div>
            <div class="controls-grid" id="controls">
                <button id="move-1" onclick="handlePlayerTurn(0)" class="btn-move action-btn"></button>
                <button id="move-2" onclick="handlePlayerTurn(1)" class="btn-move action-btn"></button>
                <button id="move-3" onclick="handlePlayerTurn(2)" class="btn-move action-btn"></button>
                <button id="move-4" onclick="handlePlayerTurn(3)" class="btn-move action-btn"></button>
            </div>
        </div>
    </div>

    <script>
        // Nota: i leggendari hanno HP base molto più alti e la flag isLegendary
        const POKEMON_DATA = [
            { name: "Bulbasaur", id: 1, hp: 120, moves: [{n:"Azione", d:15}, {n:"Foglia Lama", d:35}, {n:"Solarraggio", d:55}, {n:"Frustata", d:20}] },
            { name: "Charmander", id: 4, hp: 100, moves: [{n:"Graffio", d:15}, {n:"Braciere", d:30}, {n:"Lanciafiamme", d:50}, {n:"Ira", d:25}] },
            { name: "Squirtle", id: 7, hp: 110, moves: [{n:"Azione", d:15}, {n:"Pistolacqua", d:30}, {n:"Idropompa", d:50}, {n:"Bolla", d:20}] },
            { name: "Pikachu", id: 25, hp: 95, moves: [{n:"Tuonoshock", d:25}, {n:"Att. Rapido", d:20}, {n:"Fulmine", d:45}, {n:"Codaferro", d:30}] },
            { name: "Gengar", id: 94, hp: 130, moves: [{n:"Palla Ombra", d:45}, {n:"Mangiasogni", d:35}, {n:"Neropulsar", d:40}, {n:"Urto", d:15}] },
            { name: "Lucario", id: 448, hp: 125, moves: [{n:"Forzasfera", d:45}, {n:"Zuffa", d:50}, {n:"Pugnoscarica", d:25}, {n:"Ossoraffica", d:30}] },
            { name: "Greninja", id: 658, hp: 115, moves: [{n:"Idropulsar", d:35}, {n:"Acquagetto", d:25}, {n:"Nottesferza", d:40}, {n:"Idropompa", d:50}] },
            { name: "Rayquaza", id: 384, hp: 300, isLegendary: true, moves: [{n:"Oltraggio", d:60}, {n:"Extrarapido", d:35}, {n:"Dragopulsar", d:50}, {n:"Tuono", d:45}] },
            { name: "Snorlax", id: 143, hp: 220, moves: [{n:"Corpo a Corpo", d:40}, {n:"Morso", d:25}, {n:"Terremoto", d:45}, {n:"Riposo", d:10}] },
            { name: "Mewtwo", id: 150, hp: 280, isLegendary: true, moves: [{n:"Psichico", d:55}, {n:"Palla Ombra", d:45}, {n:"Aurasfera", d:40}, {n:"Ripresa", d:15}] },
            { name: "Arcanine", id: 59, hp: 140, moves: [{n:"Fuococarica", d:50}, {n:"Morso", d:25}, {n:"Extrarapido", d:35}, {n:"Lanciafiamme", d:40}] },
            { name: "Dragonite", id: 149, hp: 180, moves: [{n:"Dragospiro", d:35}, {n:"Alidacciaio", d:40}, {n:"Tuonopugno", d:40}, {n:"Iper Raggio", d:65}] }
        ];

        const enemyTeam = [
            { name: "HOUNDOOM", id: 229, hp: 120, moves: ["LANCIAFIAMME", "SGRANOCCHIO"] },
            { name: "SPIRITOMB", id: 442, hp: 130, moves: ["PALLA OMBRA", "NEROPULSAR"] },
            { name: "SHARPEDO", id: 319, hp: 120, moves: ["IDROPOMPA", "ACQUAGETTO"] },
            { name: "ZOROARK", id: 571, hp: 125, moves: ["NOTTURFORZA", "URTO"] },
            { name: "YVELTAL", id: 717, hp: 320, isLegendary: true, moves: ["ALI DEL DESTINO", "TIFONE"] },
            { name: "DARKRAI", id: 491, hp: 280, isLegendary: true, moves: ["VUOTOTETRO", "GELO RAGGIO"] }
        ];

        let selectedTeamIndices = [];
        let playerSquad = [];
        let currentPlayerIndex = 0;
        let currentEnemyIndex = 0;
        let enemyHP = 100;
        let isTurnInProgress = false;

        function initGrid() {
            const grid = document.getElementById('starter-grid');
            POKEMON_DATA.forEach((pk, index) => {
                const card = document.createElement('div');
                card.className = 'starter-card';
                card.innerHTML = `
                    <div class="selection-badge"></div>
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pk.id}.png" width="90" class="mx-auto">
                    <div class="text-[9px] mt-2 font-bold ${pk.isLegendary ? 'text-yellow-400' : ''}">${pk.name.toUpperCase()}</div>
                    ${pk.isLegendary ? '<div class="text-[7px] text-yellow-500">LEGGENDARIO</div>' : ''}
                `;
                card.onclick = () => toggleSelection(index, card);
                grid.appendChild(card);
            });
        }

        function toggleSelection(index, element) {
            const pos = selectedTeamIndices.indexOf(index);
            if (pos === -1) {
                if (selectedTeamIndices.length < 6) {
                    selectedTeamIndices.push(index);
                    element.classList.add('selected');
                }
            } else {
                selectedTeamIndices.splice(pos, 1);
                element.classList.remove('selected');
            }
            
            document.querySelectorAll('.starter-card').forEach(card => card.querySelector('.selection-badge').innerText = "");
            selectedTeamIndices.forEach((idIdx, order) => {
                const card = document.getElementById('starter-grid').children[idIdx];
                card.querySelector('.selection-badge').innerText = order + 1;
                card.querySelector('.selection-badge').style.display = 'flex';
            });

            const count = selectedTeamIndices.length;
            document.getElementById('selection-count').innerText = count;
            const btn = document.getElementById('start-btn');
            
            if (count > 0) {
                btn.disabled = false;
                btn.classList.replace('bg-gray-500', 'bg-green-600');
                btn.classList.replace('opacity-50', 'opacity-100');
                btn.classList.remove('cursor-not-allowed');
            } else {
                btn.disabled = true;
                btn.classList.replace('bg-green-600', 'bg-gray-500');
                btn.classList.replace('opacity-100', 'opacity-50');
                btn.classList.add('cursor-not-allowed');
            }
        }

        function startGame() {
            playerSquad = selectedTeamIndices.map(idx => {
                const base = POKEMON_DATA[idx];
                return { ...base, currentHp: base.hp };
            });
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('arena').style.display = 'block';
            document.getElementById('ui-tray').style.display = 'grid';

            setupActivePlayer();
            const firstEnemy = enemyTeam[0];
            enemyHP = firstEnemy.hp;
            document.getElementById('enemy-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${firstEnemy.id}.png`;
            document.getElementById('enemy-name').innerText = firstEnemy.name;
            
            updateHealthBars();
            showMessage(`L'allenatrice EMANUELA AISA ti sfida!`);
        }

        function setupActivePlayer() {
            const pkmn = playerSquad[currentPlayerIndex];
            document.getElementById('player-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/${pkmn.id}.png`;
            document.getElementById('player-sprite').style.opacity = '1';
            document.getElementById('player-name-ui').innerText = pkmn.name.toUpperCase();
            document.getElementById('player-card').style.opacity = '1';
            
            for(let i=0; i<4; i++) {
                const btn = document.getElementById(`move-${i+1}`);
                btn.innerText = pkmn.moves[i].n;
            }
        }

        function showMessage(text) { document.getElementById('message-box').innerText = text; }
        function setButtonsDisabled(disabled) { document.querySelectorAll('.action-btn').forEach(b => b.disabled = disabled); }

        function updateHealthBars() {
            const activePlayer = playerSquad[currentPlayerIndex];
            const enemyMax = enemyTeam[currentEnemyIndex].hp;
            
            document.getElementById('enemy-hp-bar').style.width = (enemyHP / enemyMax * 100) + '%';
            document.getElementById('player-hp-bar').style.width = (activePlayer.currentHp / activePlayer.hp * 100) + '%';
            document.getElementById('player-hp-text').innerText = `${Math.ceil(activePlayer.currentHp)} / ${activePlayer.hp} HP`;
            
            // Colorazione barra HP in base allo stato
            const bars = [
                {fill: 'enemy-hp-bar', val: enemyHP, max: enemyMax},
                {fill: 'player-hp-bar', val: activePlayer.currentHp, max: activePlayer.hp}
            ];
            
            bars.forEach(b => {
                const ratio = b.val / b.max;
                const el = document.getElementById(b.fill);
                if (ratio > 0.5) el.style.backgroundColor = '#4CAF50';
                else if (ratio > 0.2) el.style.backgroundColor = '#FFC107';
                else el.style.backgroundColor = '#F44336';
            });
        }

        async function handlePlayerTurn(moveIdx) {
            if (isTurnInProgress) return;
            isTurnInProgress = true;
            setButtonsDisabled(true);

            const activePkmn = playerSquad[currentPlayerIndex];
            const move = activePkmn.moves[moveIdx];
            
            // Calcolo danno con bonus leggendario
            let finalDamage = move.d;
            if (activePkmn.isLegendary) {
                finalDamage = Math.floor(finalDamage * 1.5);
                showMessage(`IL LEGGENDARIO ${activePkmn.name.toUpperCase()} sprigiona la sua aura!`);
                await new Promise(r => setTimeout(r, 800));
            }
            
            showMessage(`${activePkmn.name.toUpperCase()} usa ${move.n.toUpperCase()}!`);
            
            document.getElementById('player-sprite').style.transform = 'translate(60px, -60px)';
            setTimeout(() => { document.getElementById('player-sprite').style.transform = 'translate(0, 0)'; }, 150);

            setTimeout(() => {
                const enemySprite = document.getElementById('enemy-sprite');
                enemySprite.style.opacity = '0.3';
                setTimeout(() => { if(enemyHP > 0) enemySprite.style.opacity = '1'; }, 100);
                
                enemyHP = Math.max(0, enemyHP - finalDamage);
                updateHealthBars();

                if (enemyHP <= 0) setTimeout(handleEnemyFaint, 800);
                else {
                    setTimeout(() => {
                        showMessage("EMANUELA AISA sta pensando alla mossa da usare...");
                        setTimeout(handleEnemyTurn, 1500);
                    }, 1000);
                }
            }, 600);
        }

        function handleEnemyTurn() {
            const currentEnemy = enemyTeam[currentEnemyIndex];
            const moveName = currentEnemy.moves[Math.floor(Math.random() * currentEnemy.moves.length)];
            
            // Danni nemici: i leggendari di Aisa fanno più male
            let baseDamage = 20 + Math.floor(Math.random() * 15);
            if (currentEnemy.isLegendary) baseDamage = Math.floor(baseDamage * 1.5);
            
            showMessage(`${currentEnemy.name} nemico usa ${moveName}!`);

            document.getElementById('enemy-sprite').style.transform = 'translate(-60px, 60px)';
            setTimeout(() => { document.getElementById('enemy-sprite').style.transform = 'translate(0, 0)'; }, 150);

            setTimeout(() => {
                const playerSprite = document.getElementById('player-sprite');
                playerSprite.style.opacity = '0.1';
                setTimeout(() => { if(playerSquad[currentPlayerIndex].currentHp > 0) playerSprite.style.opacity = '1'; }, 100);

                playerSquad[currentPlayerIndex].currentHp = Math.max(0, playerSquad[currentPlayerIndex].currentHp - baseDamage);
                updateHealthBars();

                if (playerSquad[currentPlayerIndex].currentHp <= 0) setTimeout(handlePlayerFaint, 800);
                else {
                    setTimeout(() => {
                        showMessage(`Cosa deve fare ${playerSquad[currentPlayerIndex].name.toUpperCase()}?`);
                        setButtonsDisabled(false);
                        isTurnInProgress = false;
                    }, 1200);
                }
            }, 600);
        }

        function handleEnemyFaint() {
            showMessage(`${enemyTeam[currentEnemyIndex].name} nemico è esausto!`);
            document.getElementById('enemy-sprite').style.transform = 'translateY(500px)';
            document.getElementById('enemy-sprite').style.opacity = '0';
            document.getElementById('enemy-card').style.opacity = '0';
            
            setTimeout(() => {
                currentEnemyIndex++;
                if (currentEnemyIndex >= enemyTeam.length) {
                    document.getElementById('victory-screen').style.display = 'flex';
                } else {
                    const next = enemyTeam[currentEnemyIndex];
                    enemyHP = next.hp;
                    document.getElementById('enemy-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${next.id}.png`;
                    document.getElementById('enemy-name').innerText = next.name;
                    document.getElementById('enemy-sprite').style.transform = 'translateY(0)';
                    document.getElementById('enemy-sprite').style.opacity = '1';
                    document.getElementById('enemy-card').style.opacity = '1';
                    updateHealthBars();
                    showMessage(`EMANUELA AISA manda in campo ${next.name}!`);
                    setTimeout(() => {
                        setButtonsDisabled(false);
                        isTurnInProgress = false;
                    }, 1200);
                }
            }, 1500);
        }

        function handlePlayerFaint() {
            const faintedPkmn = playerSquad[currentPlayerIndex];
            showMessage(`${faintedPkmn.name.toUpperCase()} è esausto!`);
            document.getElementById('player-sprite').style.opacity = '0';
            document.getElementById('player-card').style.opacity = '0';
            
            setTimeout(() => {
                currentPlayerIndex++;
                if (currentPlayerIndex >= playerSquad.length) {
                    document.getElementById('defeat-screen').style.display = 'flex';
                } else {
                    const nextPkmn = playerSquad[currentPlayerIndex];
                    showMessage(`Tocca a te, ${nextPkmn.name.toUpperCase()}!`);
                    setupActivePlayer();
                    updateHealthBars();
                    setTimeout(() => {
                        setButtonsDisabled(false);
                        isTurnInProgress = false;
                    }, 1200);
                }
            }, 1500);
        }

        window.onload = initGrid;
    </script>
</body>
</html>
