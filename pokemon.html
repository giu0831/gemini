<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Pro - Strategic PP Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Press+Start+2P', cursive;
            background-color: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }

        .game-container { width: 100vw; height: 100vh; position: relative; display: flex; flex-direction: column; }

        /* Colori Tipi */
        .type-fire { background-color: #FF421C !important; }
        .type-water { background-color: #2C9BE3 !important; }
        .type-grass { background-color: #62B957 !important; }
        .type-electric { background-color: #FFDC31 !important; color: #333 !important; }
        .type-psychic { background-color: #FF5587 !important; }
        .type-normal { background-color: #A8A878 !important; }
        .type-dragon { background-color: #7766EE !important; }
        .type-dark { background-color: #4F3A2D !important; }
        .type-ghost { background-color: #705898 !important; }
        .type-steel { background-color: #B8B8D0 !important; color: #333 !important; }
        .type-ice { background-color: #98D8D8 !important; color: #333 !important; }
        .type-fighting { background-color: #BB5544 !important; }
        .type-poison { background-color: #A040A0 !important; }
        .type-ground { background-color: #E0C068 !important; color: #333 !important; }
        .type-rock { background-color: #B8A038 !important; }
        .type-bug { background-color: #A8B820 !important; }
        .type-fairy { background-color: #EE99AC !important; color: #333 !important; }
        .type-flying { background-color: #A890F0 !important; }

        /* Schermata Selezione */
        #selection-screen, #switch-overlay, #info-modal, #stats-modal {
            position: absolute; inset: 0; background: #222; z-index: 500; padding: 15px; display: flex; flex-direction: column;
        }

        #info-modal, #stats-modal {
            z-index: 1000;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px; border-bottom: 2px solid #444; }
        .type-chip { padding: 6px 10px; border-radius: 4px; font-size: 7px; cursor: pointer; white-space: nowrap; opacity: 0.6; }
        .type-chip.active { opacity: 1; outline: 2px solid white; }

        .pokedex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; overflow-y: auto; flex: 1; padding-bottom: 80px; }
        .pkmn-card { background: #333; border: 3px solid #444; border-radius: 8px; padding: 8px; cursor: pointer; text-align: center; position: relative; }
        .pkmn-card.selected { border-color: #ffcb05; background: #444; }
        
        .info-btn { 
            position: absolute; top: 2px; left: 2px; 
            background: #555; color: white; width: 18px; height: 18px; 
            border-radius: 50%; font-size: 8px; display: flex; 
            justify-content: center; align-items: center; border: 1px solid #777;
        }
        
        .sel-num { position: absolute; top: -5px; right: -5px; background: #ffcb05; color: #000; width: 22px; height: 22px; border-radius: 50%; display: none; justify-content: center; align-items: center; font-size: 8px; border: 2px solid #000; }
        .selected .sel-num { display: flex; }

        /* Battle Arena */
        .battle-scene { flex: 1; background: linear-gradient(to bottom, #78C850 50%, #C0F8A0 50%); position: relative; display: none; overflow: hidden; }
        
        .status-box { background: #fff; border: 4px solid #333; color: #333; padding: 8px; width: 220px; position: absolute; z-index: 10; box-shadow: 4px 4px 0 rgba(0,0,0,0.2); cursor: pointer; }
        .status-box:hover { background: #f0f0f0; }
        .hp-fill { height: 100%; background: #4CAF50; transition: width 0.5s; }
        
        #enemy-status { top: 15%; left: 5%; }
        #player-status { bottom: 25%; right: 5%; }

        .pkmn-img { width: 180px; height: 180px; object-fit: contain; image-rendering: pixelated; position: absolute; z-index: 4; transition: transform 0.2s; }
        #e-img { top: 28%; right: 28%; } 
        #p-img { bottom: 5%; left: 10%; } 

        .trainer-container { position: absolute; top: 5%; right: 5%; display: flex; flex-direction: column; align-items: center; z-index: 5; }
        .trainer-img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid #ffcb05; object-fit: cover; background: #fff; box-shadow: 0 0 15px rgba(255, 203, 5, 0.4); }

        /* UI Control */
        .ui-tray { height: 180px; background: #f0f0f0; border-top: 6px solid #333; display: none; grid-template-columns: 1.2fr 1fr; }
        .msg-box { padding: 15px; color: #333; font-size: 11px; border-right: 4px solid #333; line-height: 1.6; display: flex; align-items: center; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; position: relative; }
        .btn-action { border: 4px solid #333; font-family: inherit; font-size: 8px; padding: 10px; cursor: pointer; transition: all 0.1s; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .btn-action:active { transform: scale(0.95); }
        .pp-info { font-size: 7px; display: block; margin-top: 4px; font-weight: bold; }
        .pp-low { color: #ef4444; }
        .move-damage { font-size: 7px; font-weight: bold; color: #ffcb05; margin-top: 2px; text-shadow: 1px 1px 0 #000; }
        .btn-back { grid-column: span 2; background: #999 !important; color: white !important; padding: 5px !important; border-width: 3px !important; }

        #switch-overlay { display: none; z-index: 600; background: rgba(0,0,0,0.9); }
        .switch-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; overflow-y: auto; }
        .switch-item { background: #333; border: 3px solid #666; padding: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .switch-item.ko { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
    </style>
</head>
<body>

<div class="game-container">
    <!-- Selezione Squadra -->
    <div id="selection-screen">
        <h2 class="text-[10px] text-yellow-400 text-center mb-2">SCEGLI LA TUA SQUADRA (1-6)</h2>
        <div class="filter-bar" id="type-filters">
            <div class="type-chip active bg-gray-500" onclick="filterByType('All', this)">TUTTI</div>
        </div>
        <div id="pokedex-grid" class="pokedex-grid"></div>
        <div class="fixed bottom-0 left-0 w-full p-4 bg-black/80 border-t-4 border-yellow-500 flex justify-between items-center z-[550]">
            <span id="sel-count" class="text-[8px]">Selezionati: 0/6</span>
            <button id="start-btn" onclick="startBattle()" disabled class="bg-gray-600 px-6 py-2 text-[10px] opacity-50">SFIDA EMANUELA</button>
        </div>
    </div>

    <!-- Info Pokémon Modal -->
    <div id="info-modal" onclick="closeInfo()">
        <div class="bg-white text-black p-6 border-4 border-yellow-500 max-w-[90%] w-[300px] text-center" onclick="event.stopPropagation()">
            <img id="info-img" src="" class="mx-auto mb-2" width="100">
            <h3 id="info-name" class="text-[12px] font-bold mb-2">---</h3>
            <div id="info-type" class="text-[8px] mb-4 p-1 rounded inline-block text-white">---</div>
            <div class="text-[8px] text-left space-y-2">
                <p><strong>HP:</strong> <span id="info-hp">0</span></p>
                <p><strong>MOSSE E LIMITI PP:</strong></p>
                <ul id="info-moves" class="space-y-1"></ul>
            </div>
            <button onclick="closeInfo()" class="mt-6 bg-red-600 text-white p-2 text-[8px] w-full">CHIUDI</button>
        </div>
    </div>

    <!-- Pannello Statistiche in Battaglia -->
    <div id="stats-modal" onclick="closeStats()">
        <div class="bg-white text-black p-6 border-4 border-blue-500 max-w-[90%] w-[300px] text-center" onclick="event.stopPropagation()">
            <h3 class="text-[10px] font-bold mb-4">STATISTICHE ATTUALI</h3>
            <div id="stats-content" class="text-[8px] text-left space-y-4"></div>
            <p class="text-[6px] mt-4 text-gray-500 italic">I bonus accumulati influenzano i danni inflitti/ricevuti.</p>
            <button onclick="closeStats()" class="mt-6 bg-blue-600 text-white p-2 text-[8px] w-full">TORNA ALLA LOTTA</button>
        </div>
    </div>

    <!-- Cambio Pokémon -->
    <div id="switch-overlay">
        <h2 class="text-center text-[10px] text-white mb-4">CAMBIA POKÉMON</h2>
        <div id="switch-list" class="switch-list"></div>
        <button onclick="closeSwitch()" id="back-btn" class="mt-4 bg-red-600 p-3 text-[10px]">ANNULLA</button>
    </div>

    <!-- Campo di Battaglia -->
    <div id="arena" class="battle-scene">
        <div class="trainer-container">
            <img src="https://lh3.googleusercontent.com/a-/ALV-UjX5WaAKPyFOdPE72EV2dbV2IvSo1Xbdv12mYFqvBUM9gWaaMoRU=s150-c" class="trainer-img" id="trainer-pfp">
            <p class="text-[7px] mt-2 bg-black text-yellow-400 p-1 px-2 rounded border-2 border-yellow-400">EMANUELA AISA</p>
        </div>

        <div id="enemy-status" class="status-box rounded-br-2xl border-r-8">
            <div class="flex justify-between text-[10px] mb-1"><span id="e-name">---</span><span>Lv.100</span></div>
            <div class="h-3 border-2 border-black rounded bg-gray-700"><div id="e-hp-bar" class="hp-fill"></div></div>
        </div>

        <img id="e-img" src="" class="pkmn-img">

        <div id="player-status" class="status-box rounded-tl-2xl border-l-8" onclick="showStats()">
            <div class="flex justify-between text-[10px] mb-1"><span id="p-name">---</span><span>Lv.100</span></div>
            <div class="h-3 border-2 border-black rounded bg-gray-700"><div id="p-hp-bar" class="hp-fill"></div></div>
            <div class="flex justify-between items-center mt-1">
                <span class="text-[6px] text-blue-600 font-bold underline">INFO STATS</span>
                <span class="text-[8px]" id="p-hp-text">0/0 HP</span>
            </div>
        </div>

        <img id="p-img" src="" class="pkmn-img">
    </div>

    <!-- Comandi -->
    <div id="ui" class="ui-tray">
        <div class="msg-box" id="msg-text">Cosa farà il tuo Pokémon?</div>
        
        <div id="main-menu" class="action-grid">
            <button onclick="showMoves()" class="btn-action bg-white text-black">LOTTA</button>
            <button onclick="openSwitch(true)" class="btn-action bg-white text-black">POKÉMON</button>
            <button disabled class="btn-action bg-gray-300 text-gray-400">ZAINO</button>
            <button disabled class="btn-action bg-gray-300 text-gray-400">FUGA</button>
        </div>

        <div id="moves-menu" class="action-grid hidden">
            <button id="m0" onclick="handleMove(0)" class="btn-action text-white"></button>
            <button id="m1" onclick="handleMove(1)" class="btn-action text-white"></button>
            <button id="m2" onclick="handleMove(2)" class="btn-action text-white"></button>
            <button id="m3" onclick="handleMove(3)" class="btn-action text-white"></button>
            <button onclick="showMainMenu()" class="btn-action btn-back">INDIETRO</button>
        </div>
    </div>
</div>

    function init() {

            chip.innerText = t.toUpperCase();
            chip.onclick = () => filterByType(t, chip);
            filterBar.appendChild(chip);
        });
        renderGrid();
    }

    function filterByType(type, el) {
        activeTypeFilter = type;
        document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active', 'bg-gray-500'));

        if(type === 'All') el.classList.add('bg-gray-500');
        renderGrid();
    }

    function renderGrid() {

            card.className = `pkmn-card ${selectedIdx.includes(realIdx) ? 'selected' : ''}`;
            card.innerHTML = `
                <div class="info-btn" onclick="showInfo(event, ${realIdx})">i</div>
                <div class="sel-num">${selectedIdx.indexOf(realIdx) + 1}</div>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" class="mx-auto" width="60">
                <div class="text-[6px] font-bold mt-1">${p.n.toUpperCase()}</div>
            `;
            card.onclick = () => toggleSelect(realIdx);
            grid.appendChild(card);
        });
    }

    function toggleSelect(i) {
        const pos = selectedIdx.indexOf(i);
        if(pos > -1) selectedIdx.splice(pos, 1);
        else if(selectedIdx.length < 6) selectedIdx.push(i);
        updateSelectionUI();
    }

    function updateSelectionUI() {
        document.getElementById('sel-count').innerText = `Selezionati: ${selectedIdx.length}/6`;
        const btn = document.getElementById('start-btn');
        btn.disabled = selectedIdx.length === 0;
        btn.classList.toggle('opacity-50', selectedIdx.length === 0);
        btn.classList.toggle('bg-yellow-600', selectedIdx.length > 0);
        renderGrid();
    }

    function showInfo(e, idx) {
        e.stopPropagation();
        const p = POKEMON_DB[idx];
        const modal = document.getElementById('info-modal');
        const moves = MOVE_TEMPLATES[p.t] || MOVE_TEMPLATES["Normal"];
        document.getElementById('info-name').innerText = p.n.toUpperCase();
        document.getElementById('info-hp').innerText = p.hp;
        document.getElementById('info-img').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`;
        const typeEl = document.getElementById('info-type');
        typeEl.innerText = p.t.toUpperCase();
        typeEl.className = `text-[8px] mb-4 p-1 px-3 rounded inline-block text-white type-${p.t.toLowerCase()}`;
        
        const movesList = document.getElementById('info-moves');
        movesList.innerHTML = moves.slice(0, 4).map(m => {
            const maxPP = m.p >= 100 ? 5 : 20;
            return `
                <li class="border-b border-gray-100 pb-1">
                    <span class="font-bold text-[7px]">${m.n.toUpperCase()}</span>
                    <span class="text-blue-600 text-[6px] ml-1">${m.p ? 'DANNO: '+m.p : m.desc}</span>
                    <span class="text-[6px] ml-2 ${maxPP === 5 ? 'text-red-500 font-bold' : 'text-gray-400'}">(PP: ${maxPP})</span>
                </li>
            `;
        }).join('');
        modal.style.display = 'flex';
    }

    function closeInfo() { document.getElementById('info-modal').style.display = 'none'; }

    function showStats() {
        if(isBusy) return;
        const p = playerTeam[currentPIdx];
        const modal = document.getElementById('stats-modal');
        const content = document.getElementById('stats-content');
        content.innerHTML = `
            <div class="flex items-center gap-4 mb-4 border-b pb-2">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" width="60">
                <div>
                    <h4 class="font-bold text-[10px]">${p.n.toUpperCase()}</h4>
                    <p class="text-[7px]">Salute: ${Math.ceil(p.curHp)}/${p.hp} HP</p>
                </div>
            </div>
            <div class="grid grid-cols-1 gap-2">
                <div class="flex justify-between items-center bg-gray-100 p-2 rounded">
                    <span>ATTACCO</span>
                    <span class="font-bold text-red-600">${p.stats.atk >= 0 ? '+' : ''}${p.stats.atk}</span>
                </div>
                <div class="flex justify-between items-center bg-gray-100 p-2 rounded">
                    <span>DIFESA</span>
                    <span class="font-bold text-green-600">${p.stats.def >= 0 ? '+' : ''}${p.stats.def}</span>
                </div>
            </div>
        `;
        modal.style.display = 'flex';
    }

    function closeStats() { document.getElementById('stats-modal').style.display = 'none'; }

    function startBattle() {
        playerTeam = selectedIdx.map(i => {
            const p = JSON.parse(JSON.stringify(POKEMON_DB[i]));
            p.curHp = p.hp;
            p.stats = {atk:0, def:0};
            // Logic: Powerful moves (p >= 100) get 5 PP, others 20
            p.moves = (MOVE_TEMPLATES[p.t] || MOVE_TEMPLATES["Normal"]).map(m => {
                const maxPP = m.p >= 100 ? 5 : 20;
                return {...m, pp: maxPP, max: maxPP};
            });
            return p;
        });
        enemyTeam = EMANUELA_TEAM.map(p => {
            const ep = {...p, curHp: p.hp, maxHp: p.hp, stats:{atk:0, def:0}};
            ep.moves = (MOVE_TEMPLATES[p.t] || MOVE_TEMPLATES["Normal"]).map(m => {
                 const maxPP = m.p >= 100 ? 5 : 20;
                 return {...m, pp: maxPP, max: maxPP};
            });
            return ep;
        });
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('arena').style.display = 'block';
        document.getElementById('ui').style.display = 'grid';
        loadBattleState();
    }

    function loadBattleState() {
        const p = playerTeam[currentPIdx];
        const e = enemyTeam[currentEnemyPIdx];
        document.getElementById('p-name').innerText = p.n.toUpperCase();
        document.getElementById('e-name').innerText = e.n.toUpperCase();
        document.getElementById('p-img').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/${p.id}.png`;
        document.getElementById('e-img').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${e.id}.png`;
        updateBars();
        showMainMenu();
    }

    function updateBars() {
        const p = playerTeam[currentPIdx];
        const e = enemyTeam[currentEnemyPIdx];
        const pPct = (p.curHp / p.hp) * 100;
        const ePct = (e.curHp / e.maxHp) * 100;
        document.getElementById('p-hp-bar').style.width = pPct + "%";
        document.getElementById('e-hp-bar').style.width = ePct + "%";
        document.getElementById('p-hp-text').innerText = `${Math.ceil(p.curHp)}/${p.hp} HP`;
        const color = (pct) => pct < 20 ? '#ef4444' : pct < 50 ? '#f59e0b' : '#10b981';
        document.getElementById('p-hp-bar').style.background = color(pPct);
        document.getElementById('e-hp-bar').style.background = color(ePct);
    }

    function showMainMenu() {
        document.getElementById('main-menu').classList.remove('hidden');
        document.getElementById('moves-menu').classList.add('hidden');
        msg(`Cosa farà ${playerTeam[currentPIdx].n.toUpperCase()}?`);
    }

    function showMoves() {
        if(isBusy) return;
        document.getElementById('main-menu').classList.add('hidden');
        const menu = document.getElementById('moves-menu');
        menu.classList.remove('hidden');
        playerTeam[currentPIdx].moves.forEach((m, i) => {
            const btn = document.getElementById(`m${i}`);
            const damageInfo = m.p ? `DANNO: ${m.p}` : m.desc;
            const isPowerMove = m.max === 5;
            
            btn.innerHTML = `
                <span class="font-bold">${m.n.toUpperCase()}</span>
                <span class="move-damage">${damageInfo}</span>
                <span class="pp-info ${isPowerMove ? 'pp-low' : ''}">PP ${m.pp}/${m.max}</span>
            `;
            btn.className = `btn-action type-${playerTeam[currentPIdx].t.toLowerCase()} text-white`;
            btn.disabled = m.pp <= 0;
            btn.style.opacity = m.pp <= 0 ? 0.4 : 1;
        });
    }

    async function handleMove(mIdx) {
        if(isBusy) return;
        isBusy = true;
        const p = playerTeam[currentPIdx];
        const m = p.moves[mIdx];
        m.pp--;
        
        document.getElementById('moves-menu').classList.add('hidden');
        const e = enemyTeam[currentEnemyPIdx];

        await animate(p, e, m, true);
        if(e.curHp <= 0) {
            msg(`${e.n.toUpperCase()} è esausto!`);
            currentEnemyPIdx++;
            if(currentEnemyPIdx >= enemyTeam.length) {
                msg("VITTORIA! HAI SCONFITTO EMANUELA AISA!");
                return;
            }
            await new Promise(r => setTimeout(r, 1200));
            loadBattleState();
            isBusy = false;
            return;
        }

        await new Promise(r => setTimeout(r, 800));

        // Enemy Turn
        const availableMoves = e.moves.filter(em => em.pp > 0);
        const eMove = availableMoves.length > 0 ? availableMoves[Math.floor(Math.random()*availableMoves.length)] : {n:"Scontro", p:35};
        if(eMove.pp) eMove.pp--;

        await animate(e, p, eMove, false);
        
        if(p.curHp <= 0) {
            msg(`${p.n.toUpperCase()} è esausto!`);
            isBusy = false; 
            forceSwitchMode = true;
            setTimeout(() => openSwitch(false), 1000);
        } else {
            isBusy = false;
            showMainMenu();
        }
    }

    async function animate(at, df, mv, isPlayer) {
        msg(`${at.n.toUpperCase()} usa ${mv.n.toUpperCase()}!`);
        const img = document.getElementById(isPlayer ? 'p-img' : 'e-img');
        img.style.transform = isPlayer ? 'translate(40px, -30px)' : 'translate(-40px, 30px)';
        await new Promise(r => setTimeout(r, 200));
        img.style.transform = '';

        if(mv.p) {
            const dmg = Math.floor(mv.p * ((10+at.stats.atk)/(10+df.stats.def)) * (Math.random()*0.2 + 0.9));
            df.curHp = Math.max(0, df.curHp - dmg);
            updateBars();
            df.curHp === 0 ? null : await flash(isPlayer ? 'e-img' : 'p-img');
        } else if(mv.s === 'hp') {
            at.curHp = Math.min(at.hp, at.curHp + (at.hp * (mv.v/100)));
            updateBars();
        } else {
            at.stats[mv.s] = Math.min(6, at.stats[mv.s] + mv.v);
            msg(`Statistiche di ${at.n} aumentate!`);
        }
        await new Promise(r => setTimeout(r, 800));
    }

    async function flash(id) {
        const el = document.getElementById(id);
        for(let i=0; i<3; i++) {
            el.style.opacity = '0';
            await new Promise(r => setTimeout(r, 50));
            el.style.opacity = '1';
            await new Promise(r => setTimeout(r, 50));
        }
    }

    function openSwitch(allowBack) {
        if(isBusy && allowBack) return;
        const overlay = document.getElementById('switch-overlay');
        const list = document.getElementById('switch-list');
        const backBtn = document.getElementById('back-btn');
        overlay.style.display = 'flex';
        backBtn.style.display = allowBack ? 'block' : 'none';
        list.innerHTML = '';
        playerTeam.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = `switch-item ${p.curHp <= 0 ? 'ko' : ''}`;
            const pct = (p.curHp / p.hp) * 100;
            item.innerHTML = `
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" width="45">
                <div class="flex-1">
                    <div class="text-[8px] mb-1 font-bold">${p.n.toUpperCase()}</div>
                    <div class="h-2 bg-gray-600 rounded overflow-hidden">
                        <div class="h-full" style="width:${pct}%; background:${pct < 20 ? '#f00' : '#0f0'}"></div>
                    </div>
                </div>
                <div class="text-[7px] ml-2">${Math.ceil(p.curHp)}/${p.hp}</div>
            `;
            if(p.curHp > 0 && i !== currentPIdx) item.onclick = () => performSwitch(i);
            list.appendChild(item);
        });
    }

    async function performSwitch(newIdx) {
        document.getElementById('switch-overlay').style.display = 'none';
        const oldName = playerTeam[currentPIdx].n;
        currentPIdx = newIdx;
        loadBattleState();
        msg(`Rientra ${oldName}! Vai ${playerTeam[currentPIdx].n}!`);
        
        if(!forceSwitchMode) {
            isBusy = true;
            await new Promise(r => setTimeout(r, 1200));
            const e = enemyTeam[currentEnemyPIdx];
            const eMove = e.moves[Math.floor(Math.random()*e.moves.length)];
            await animate(e, playerTeam[currentPIdx], eMove, false);
            if(playerTeam[currentPIdx].curHp <= 0) {
                forceSwitchMode = true;
                openSwitch(false);
            } else {
                isBusy = false;
                showMainMenu();
            }
        } else {
            forceSwitchMode = false;
            isBusy = false;
            showMainMenu();
        }
    }

    function closeSwitch() { document.getElementById('switch-overlay').style.display = 'none'; }
    function msg(t) { document.getElementById('msg-text').innerText = t; }

    window.onload = init;
</script>
</body>
</html>
